<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doguri's Adventure</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('Data/DungGeunMo.ttf') format('truetype');
        }

        body {
            margin: 0; padding: 0; background-color: #111;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'DungGeunMo', sans-serif;
            overflow: hidden; color: #fff;
        }

        #game-container {
            position: relative; width: 1280px; height: 720px;
            background-size: cover; background-position: center;
            background-color: #222; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .screen.active { display: block; }
        
        .ui-element { position: absolute; object-fit: none; transform: translate(-50%, -50%); }
        
        .clickable { cursor: pointer; transition: transform 0.1s ease; }
        .clickable:active { transform: translate(-50%, -50%) scale(0.95) !important; filter: brightness(0.8); }
        
        .locked-diff { filter: brightness(0.3); }

        .weapon-ui {
            position: absolute; z-index: 0; transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
        }
        #weapon-shield { left: 64px; top: 680px; }
        #weapon-shield.active { left: 365px; top: 560px; transform: translate(-50%, -50%) rotate(15deg); }

        #weapon-sword { left: 1147px; top: 622px; }
        #weapon-sword.active { left: 1019px; top: 543px; }

        #weapon-staff { left: 1196px; top: 600px; display: none; }
        #weapon-staff.active { left: 1075px; top: 486px; }

        .vfx-sprite {
            position: absolute; left: 640px; top: 337px;
            width: 250px; height: 250px; transform: translate(-50%, -50%);
            background-size: 200% 200%; z-index: 15; display: none; pointer-events: none;
        }
        #attack-vfx { background-image: url('Data/DR_Slash_Attack_fx.png'); }
        #hit-vfx { background-image: url('Data/DR_Hit_fx_1.png'); z-index: 16; }

        #red-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: red; opacity: 0; z-index: 99; pointer-events: none;
            transition: opacity 0.1s ease;
        }

        .monster-dead { filter: brightness(0) !important; opacity: 0; transition: all 0.5s ease; }

        #hp-gauge, #mp-gauge, #monster-hp-gauge, #attack-time-gauge { transition: clip-path 0.2s ease-out; }
        .poisoned-hp { filter: hue-rotate(90deg) saturate(200%) brightness(0.8); }

        .status-text {
            position: absolute; transform: translate(-50%, -50%);
            font-size: 20px; font-weight: bold; color: #fff; z-index: 3;
            text-shadow: 1.5px 1.5px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }

        #monster-gauge-img {
            z-index: 5; filter: sepia(1) hue-rotate(320deg) saturate(5) brightness(0.6);
            clip-path: inset(100% 0 0 0); pointer-events: none;
        }

        #monster-chat {
            position: absolute; left: 700px; top: 250px; background: #fff; color: #000;
            padding: 15px 25px; border-radius: 20px; font-size: 19px; max-width: 300px;
            z-index: 10; display: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transform: translate(0, -50%); white-space: pre-wrap; font-weight: bold;
        }
        #monster-chat::before {
            content: ''; position: absolute; bottom: -15px; left: 30px;
            border-width: 15px 15px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        #player-chat-text {
            position: absolute; left: 640px; top: 524.5px; width: 400px; height: 60px;
            transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center;
            font-size: 19px; color: #fff; z-index: 20; display: none; white-space: pre-wrap; font-weight: bold; text-align: center;
        }

        #typing-input {
            position: absolute; left: 640px; top: 639.5px; transform: translate(-50%, -50%);
            background: transparent; border: none; color: #fff;
            font-size: 30px; font-family: 'DungGeunMo', sans-serif;
            text-align: center; outline: none; width: 350px; z-index: 20;
        }

        .popup-text {
            position: absolute; left: 640px; top: 320px; width: 358px; height: 200px;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            font-size: 30px; color: #fff; z-index: 102; pointer-events: none;
            white-space: pre-wrap; line-height: 1.5;
        }

        #cinematic-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 300; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #cinematic-text {
            font-size: 30px; color: #fff; text-align: center; white-space: pre-wrap; line-height: 2; padding: 0 50px;
        }

        .skill-text {
            position: absolute; transform: translate(-50%, -50%); font-size: 26px; font-weight: bold; z-index: 10;
            background: linear-gradient(to top, #fff var(--fill, 100%), #444 var(--fill, 100%));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: left 0.3s ease; 
        }
        .locked-skill { color: #555 !important; background: none !important; -webkit-text-fill-color: #555 !important; }

        #py-1 { left: 250px; top: 580.5px; }
        #py-slash { left: 230px; top: 580.5px; display: none; color: #aaa; background: none; -webkit-text-fill-color: #aaa; }
        #py-1-extra { left: 295px; top: 580.5px; display: none; }
        
        #py-2 { left: 250px; top: 610.5px; }
        #py-3 { left: 250px; top: 640.5px; }

        #mp-1 { left: 1030px; top: 580.5px; }
        #mp-2 { left: 1030px; top: 610.5px; }
        
        #mp-3 { left: 1030px; top: 640.5px; }
        #mp-slash { left: 1015px; top: 640.5px; display: none; color: #aaa; background: none; -webkit-text-fill-color: #aaa; }
        #mp-3-extra { left: 1075px; top: 640.5px; display: none; } 

        @keyframes shake-anim {
            0%, 100% { margin-left: 0; }
            25% { margin-left: -10px; }
            50% { margin-left: 10px; }
            75% { margin-left: -10px; }
        }
        @keyframes shake-screen-anim {
            0%, 100% { left: 0; top: 0; }
            25% { left: -8px; top: 8px; }
            50% { left: 8px; top: -8px; }
            75% { left: -8px; top: -8px; }
        }
        @keyframes block-screen-anim {
            0%, 100% { left: 0; }
            33% { left: -4px; }
            66% { left: 4px; }
        }
        .shake-monster { animation: shake-anim 0.2s ease-in-out; }
        .shake-screen { animation: shake-screen-anim 0.2s ease-in-out; }
        .block-screen { animation: block-screen-anim 0.15s ease-in-out; }

        #sound-toggle-btn {
            position: absolute; left: 20px; bottom: 20px; 
            font-size: 16px; color: #888; text-decoration: underline; 
            z-index: 999; cursor: pointer; font-family: 'DungGeunMo', sans-serif;
        }
        #sound-toggle-btn:hover { color: #fff; }

        #reset-btn {
            position: absolute; right: 20px; bottom: 20px; 
            font-size: 16px; color: #888; text-decoration: underline; 
            z-index: 999; cursor: pointer; font-family: 'DungGeunMo', sans-serif;
        }
        #reset-btn:hover { color: #fff; }

        .key-hint {
            position: absolute; transform: translate(-50%, -50%);
            font-size: 16px; color: #aaa; font-weight: bold; pointer-events: none; z-index: 50;
        }

        .relic-locked { filter: brightness(0.2) grayscale(1); pointer-events: none; }
    </style>

    <script>
        /* =================================================================
           오디오 설정 및 사운드 토글
        ================================================================= */
        let isMuted = false;
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTypingSound() {
            if(isMuted) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

            let mainBgm = document.getElementById('bgm-main');

            let endingBgm = document.getElementById('bgm-ending');
            if(!mainBgm || !fightBgm || !endingBgm) return;

            } else if (type === 'fight') {
                mainBgm.pause(); endingBgm.pause();

                if (!fightBgm.src.includes(targetSrc)) {

                    fightBgm.load();
                }
                fightBgm.play().catch(()=>{});
            } else if (type === 'ending') {
                mainBgm.pause(); fightBgm.pause();
                endingBgm.play().catch(()=>{});
            }
        }

                if (gData.unlockedDiff > 3 && gData.relics.length >= 3) {

                    gameState = 'ALERT';
                    showPopup("이전 난이도<br>클리어 필요", "ALERT", true);
                    return;

        /* =================================================================
           단일 메인 루프
        ================================================================= */
        function gameLoop(currentTime) {
            gameLoopId = requestAnimationFrame(gameLoop);
            
            if (gameState !== 'GAME') {
                lastTime = currentTime; 
                return;
            }
            
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            stageTimer -= dt;
            updateTimerUI();
            if (stageTimer <= 0) {
                gameState = 'GAMEOVER'; inputEl.blur();
                showPopup('시간 초과!\n게임 오버!', 'GAMEOVER');
                return;
            }

            if (gData.relics.includes(3)) {
                if(player.mp < player.maxMp) { player.mp = player.maxMp; updateStatusUI(); }
            }

            if (gData.relics.includes(2) && player.hp > 0 && player.hp < player.maxHp) {
                relic2Timer += dt;
                if(relic2Timer >= 4000) {
                    relic2Timer = 0; player.hp++; updateStatusUI();
                }
            } else { relic2Timer = 0; }

            if (gData.relics.includes(1) && monster && monster.hp > 0 && player.stunTimer <= 0) {
                relic1Timer += dt;
                if (relic1Timer >= 3000) {
                    relic1Timer = 0;
                    let dmg = 1 + gData.bonusPyAtk; 
                    triggerMonsterShake();
                    document.getElementById('attack-vfx').style.backgroundImage = `url('Data/DR_Slash_Attack_fx.png')`;
                    playSpriteVFX('attack-vfx');
                    playSpriteVFX('hit-vfx'); 
                    playAudio('sfx-slash');
                    monster.hp -= dmg;
                    updateMonsterHpUI();
                    if (monster.hp <= 0) triggerMonsterDeath();
                }
            }

            if (sessionFlags.poisoned && player.hp > 0) {
                poisonTimer += dt;
                if (poisonTimer >= 2000) {
                    poisonTimer -= 2000;
                    player.hp -= 1;
                    updateStatusUI();
                    triggerScreenShake();
                    if (player.hp <= 0) {
                        gameState = 'GAMEOVER'; inputEl.blur(); 
                        showPopup('게임 오버!', 'GAMEOVER');
                    }
                }
            }

            if (player.stunTimer > 0) player.stunTimer -= dt;
            if (monsterStunTimer > 0) monsterStunTimer -= dt;

            if (monsterStunTimer <= 0 && monster && monster.hp > 0) {
                monsterAttackTimer += dt;
                let ratio = Math.min(1, monsterAttackTimer / monster.cd);
                document.getElementById('monster-gauge-img').style.clipPath = `inset(${100 - (ratio * 100)}% 0 0 0)`;

                if (monsterAttackTimer >= monster.cd) {
                    monsterAttackTimer = 0; monsterAttacksPlayer();
                }
            }

            mpRegenTimer += dt;
            if (mpRegenTimer >= 1000) {
                if(player.mp < player.maxMp) {
                    player.mp = Math.min(player.maxMp, player.mp + 1);
                    updateStatusUI(); 
                }
                mpRegenTimer -= 1000;
            }

            for (const [sName, sData] of Object.entries(SKILLS)) {
                if (!sData.el) continue;
                let timePassed = currentTime - player.cooldowns[sName];
                let cdPercent = Math.min(100, (timePassed / sData.cd) * 100);
                let el = document.getElementById(sData.el);
                if (el) el.style.setProperty('--fill', `${cdPercent}%`);
            }

            if(document.activeElement !== inputEl) inputEl.focus();
        }

        inputEl.addEventListener('keydown', (e) => {
            if (gameState !== 'GAME') { e.preventDefault(); return; }

            if (e.key === 'Enter') {
                const word = e.target.value.trim();
                const now = performance.now();
                if (player.stunTimer > 0) { e.target.value = ''; return; }

                if (SKILLS[word]) {
                    let s = SKILLS[word];
                    
                    if (s.type === 'mp' && !gData.hasStaff) { e.target.value = ''; return; }
                    if (s.reqFlag && !gData[s.reqFlag]) { e.target.value = ''; return; }
                    
                    if (now - player.cooldowns[word] >= s.cd && player.mp >= s.mp) {
                        player.cooldowns[word] = now;
                        player.mp -= s.mp;
                        
                        player.isDefending = false;
                        document.getElementById('weapon-shield').classList.remove('active');
                        document.getElementById('magic-shield-fx').style.display = 'none';
                        
                        if (word === '방어' || word === '쉴드') {
                            player.isDefending = true;
                            player.currentDefSkill = word;
                            if (word === '방어') {
                                document.getElementById('weapon-shield').classList.add('active'); 
                                playAudio('sfx-def');
                            } else if (word === '쉴드') {
                                document.getElementById('magic-shield-fx').style.display = 'block';
                                playAudio('sfx-mgshield');
                            }
                        } else {
                            if (s.type === 'py') {
                                const sw = document.getElementById('weapon-sword');
                                sw.classList.add('active'); setTimeout(() => sw.classList.remove('active'), 150);
                            } else if (s.type === 'mp') {
                                const st = document.getElementById('weapon-staff');
                                st.classList.add('active'); setTimeout(() => st.classList.remove('active'), 150);
                            }
                            playerAttacksMonster(word, s);
                        }
                        updateStatusUI();
                    }
                }
                e.target.value = '';
            }
        });

        function playerAttacksMonster(skillName, skillData) {
            player.consecutiveDefends = 0;

            let dmg = skillData.dmg;
            if (skillData.type === 'py') dmg += gData.bonusPyAtk; 
            
            if (skillData.type === 'py') {
                if (monster.id === 'harpy' && Math.random() < 0.5) dmg = 0;
                if (monster.id === 'griffin' && Math.random() < 0.7) dmg = 0;
                if (monster.id === 'succubus' && Math.random() < 0.5) dmg = 0;
                if (monster.id === 'demon' && Math.random() < 0.8) dmg = 0;
            }

            if (dmg > 0) {
                if (monster.id === 'golem') {
                    if (skillData.type === 'py') dmg = 1;
                    if (skillName === '파이어볼') dmg *= 2;
                }
                else if (monster.id === 'harpy') {
                    if (skillData.type === 'mp') dmg *= 2;
                }
                else if (monster.id === 'gargoyle') {
                    if (skillData.type === 'py') dmg = 1;
                    if (skillData.type === 'mp') dmg *= 2;
                }
                else if (monster.id === 'succubus') {
                    if (skillData.type === 'mp' && skillName !== '라이트닝') dmg = 2;
                    if (skillName === '라이트닝') {
                        dmg *= 3; 
                        if(Math.random() < 0.8) monsterStunTimer = 3000;
                    }
                }
                else if (monster.id === 'demon') {
                    if (skillData.type === 'mp') dmg = 1;
                    if (skillName === '매직 애로우' && Math.random() < 0.8) monsterStunTimer = 3000;
                }
                // 익스트림 난이도 바포메트: 마법 대미지 면역
                else if (monster.id === 'baphomet') {
                    if (skillData.type === 'mp') dmg = 0;
                }
                // 익스트림 난이도 루시퍼: 기본 대미지 1, 마법 공격 시 30% 확률로 대미지 10배(10)
                else if (monster.id === 'lucifer') {
                    dmg = 1;
                    if (skillData.type === 'mp' && Math.random() < 0.3) {
                        dmg = 10;
                    }
                }
            }

            triggerMonsterShake();
            let vfxImg = skillData.vfx ? skillData.vfx : 'DR_Slash_Attack_fx.png';
            document.getElementById('attack-vfx').style.backgroundImage = `url('Data/${vfxImg}')`;
            
            playSpriteVFX('attack-vfx');
            playSpriteVFX('hit-vfx'); 
            
            if (skillName === '베기' || skillName === '찌르기') playAudio('sfx-slash');
            else if (skillName === '연속 베기') playAudio('sfx-double-slash');
            else if (skillName === '파이어볼') playAudio('sfx-fireball');
            else if (skillName === '매직 애로우') playAudio('sfx-mgarrow');
            else if (skillName === '라이트닝') playAudio('sfx-lightning');
            else playAudio('sfx-slash');
            
            if (dmg > 0) {
                const hitLines = ["크악!", "아프다!", "이놈이!", "제법이군.."];
                playDialogue(hitLines[Math.floor(Math.random() * hitLines.length)], null);
                monster.hp -= dmg;
                updateMonsterHpUI();
                if (monster.hp <= 0) triggerMonsterDeath();
            } else {
                playDialogue("빗나갔다!", null); 
            }
        }

        function monsterAttacksPlayer() {
            let dmg = monster.atk;
            
            if (player.isDefending) {
                if (monster.id === 'succubus') dmg = 2;
                else if (monster.id === 'demon' && player.currentDefSkill !== '쉴드') dmg = monster.atk; 
                else if (monster.id === 'gargoyle') dmg = 1;
                else {
                    dmg = 0; 
                    
                    if (monster.id === 'wolf' || monster.id === 'dullahan') {
                        player.consecutiveDefends++;
                        
                        if (monster.id === 'wolf') {
                            if (player.consecutiveDefends >= 3) {
                                playDialogue(null, "방어 3번 성공! 늑대가 지쳐 도망갑니다.");
                                monster.hp = 0; updateMonsterHpUI(); triggerMonsterDeath(); return;
                            } else {
                                playDialogue(null, `방어 성공! (${player.consecutiveDefends}/3)`);
                            }
                        }
                        if (monster.id === 'dullahan') {
                            if (player.consecutiveDefends >= 5) {
                                playDialogue(null, "방어 5번 성공! 듀라한이 제풀에 지쳐 쓰러집니다.");
                                monster.hp = 0; updateMonsterHpUI(); triggerMonsterDeath(); return;
                            } else {
                                playDialogue(null, `방어 성공! (${player.consecutiveDefends}/5)`);
                            }
                        }
                    }
                    
                    // 익스트림 난이도 켈베로스: 쉴드로 방어 시 스턴
                    if (monster.id === 'cerberus' && player.currentDefSkill === '쉴드') {
                        monsterStunTimer = 3000;
                        playDialogue(null, "켈베로스가 쉴드에 부딪혀 기절했다!");
                    }
                }
                
                player.isDefending = false; 
                document.getElementById('weapon-shield').classList.remove('active');
                document.getElementById('magic-shield-fx').style.display = 'none';
                triggerBlockShake(); 
                
                if (player.currentDefSkill === '쉴드') playAudio('sfx-mgshield');
                else playAudio('sfx-def');
            } else {
                player.consecutiveDefends = 0;
            }

            if (dmg > 0) {
                player.hp -= dmg;
                updateStatusUI();
                triggerScreenShake(); 
                
                if (Math.random() < 0.5) playAudio('sfx-monsterhit-1');
                else playAudio('sfx-monsterhit-2');
                
                playDialogue(null, HIT_PLAYER_LINES[Math.floor(Math.random() * HIT_PLAYER_LINES.length)]);

                if (monster.id === 'spider' && !sessionFlags.poisoned) {
                    sessionFlags.poisoned = true;
                    document.getElementById('hp-gauge').classList.add('poisoned-hp');
                }
                
                if (monster.id === 'highorc' && !gData.hasCombo) {
                    gData.hasCombo = true; saveData();
                    updateSkillUI();
                    gameState = 'POPUP';
                    inputEl.blur();
                    showPopup('연속 베기를\n습득했다!', 'NEXT');
                    return; 
                }

                if (player.hp <= 0) {
                    gameState = 'GAMEOVER'; inputEl.blur(); 
                    showPopup('게임 오버!', 'GAMEOVER');
                }
            }
        }

        function triggerMonsterDeath() {
            let now = performance.now();
            Object.keys(SKILLS).forEach(k => {
                player.cooldowns[k] = now - SKILLS[k].cd;
                let el = document.getElementById(SKILLS[k].el);
                if (el) el.style.setProperty('--fill', '100%');
            });

            playAudio('sfx-kill');

            const mImg = document.getElementById('monster-img');
            const mGauge = document.getElementById('monster-gauge-img');
            
            mImg.classList.add('monster-dead');
            mGauge.style.display = 'none';
            
            document.getElementById('monster-shadow').style.display = 'none';
            document.getElementById('monster-hp-bg').style.display = 'none';
            document.getElementById('monster-hp-gauge').style.display = 'none';
            document.getElementById('monster-name-tag').style.display = 'none';

            setTimeout(() => { 
                mImg.style.display = 'none'; 
                mImg.classList.remove('monster-dead'); 
                monsterDeathProcess(); 
            }, 500);
        }

        function monsterDeathProcess() {
            let goldGained = monster.isBoss ? Math.floor(Math.random() * 4) + 2 : 1;
            gData.gold += goldGained; 
            document.getElementById('gold-val').innerText = gData.gold;
            saveData();
            
            let popText = `골드 +${goldGained} 획득!`;
            
            if (monster.dropItem) {
                popText += `\n${monster.dropItem} 획득!`;
                if (monster.dropItem === '마법 지팡이') { 
                    gData.hasStaff = true; 
                    gData.fireballActive = true; 
                } 
                if (monster.dropItem === '매직 애로우 해금') gData.magicArrowActive = true;
                if (monster.dropItem === '쉴드 해금') gData.shieldActive = true;
                saveData();
            }

            if (monster.id === 'demon') {
                let newRelic = 0;
                if (!gData.relics.includes(1)) {
                    newRelic = 1;
                } else {
                    let available = [2, 3].filter(r => !gData.relics.includes(r));
                    if (available.length > 0) newRelic = available[Math.floor(Math.random() * available.length)];
                }
                
                if (newRelic > 0) {
                    gData.relics.push(newRelic);
                    saveData();
                    let rNames = ["", "자동 점검", "무한 도전", "용의 심장"];
                    popText += `\n\n유물 [${rNames[newRelic]}] 획득!`;
                }
            }

            const dialog = STAGE_DIALOGUE[monster.id];
            if (dialog && dialog.outro) {
                gameState = 'TRANSITION'; 
                inputEl.blur();
                playDialogue(null, dialog.outro.p);
                setTimeout(() => {
                    if (gameState === 'TRANSITION') {
                        gameState = 'POPUP';
                        showPopup(popText, 'NEXT');
                        playAudio('sfx-getgold');
                    }
                }, 3000); 
            } else {
                gameState = 'POPUP'; inputEl.blur();
                showPopup(popText, 'NEXT');
                playAudio('sfx-getgold');
            }
        }

        /* =================================================================
           UI 렌더링 업데이트
        ================================================================= */
        function updateStatusUI() {
            let hpRatio = Math.max(0, player.hp / player.maxHp);
            document.getElementById('hp-gauge').style.clipPath = `inset(0 ${100 - hpRatio * 100}% 0 0)`;
            document.getElementById('hp-text').innerText = `${player.hp}/${player.maxHp}`;
            
            let mpRatio = Math.max(0, player.mp / player.maxMp);
            document.getElementById('mp-gauge').style.clipPath = `inset(0 ${100 - mpRatio * 100}% 0 0)`;
            document.getElementById('mp-text').innerText = `${player.mp}/${player.maxMp}`;
        }

        function updateMonsterHpUI() {
            let ratio = Math.max(0, monster.hp / monster.maxHp);
            document.getElementById('monster-hp-gauge').style.clipPath = `inset(0 ${100 - ratio * 100}% 0 0)`;
        }

        function updateSkillUI() {
            if (gData.hasCombo) {
                document.getElementById('py-1').style.left = '190px';
                document.getElementById('py-slash').style.display = 'block';
                document.getElementById('py-1-extra').style.display = 'block';
            } else {
                document.getElementById('py-1').style.left = '250px';
                document.getElementById('py-slash').style.display = 'none';
                document.getElementById('py-1-extra').style.display = 'none';
            }
            
            if (!gData.hasStaff) {
                ['mp-1', 'mp-2', 'mp-3', 'mp-3-extra'].forEach(id => {
                    let el = document.getElementById(id);
                    el.innerText = '???'; el.classList.add('locked-skill');
                    if (id === 'mp-3-extra') el.style.display = 'none';
                });
                document.getElementById('mp-slash').style.display = 'none';
                document.getElementById('weapon-staff').style.display = 'none';
            } else {
                document.getElementById('weapon-staff').style.display = 'block';
                
                if (gData.fireballActive) {
                    document.getElementById('mp-1').innerText = '파이어볼';
                    document.getElementById('mp-1').classList.remove('locked-skill');
                } else {
                    document.getElementById('mp-1').innerText = '???';
                    document.getElementById('mp-1').classList.add('locked-skill');
                }

                if (gData.magicArrowActive) {
                    document.getElementById('mp-2').innerText = '매직 애로우';
                    document.getElementById('mp-2').classList.remove('locked-skill');
                } else {
                    document.getElementById('mp-2').innerText = '???';
                    document.getElementById('mp-2').classList.add('locked-skill');
                }

                if (gData.shieldActive) {
                    document.getElementById('mp-3').innerText = '쉴드';
                    document.getElementById('mp-3').classList.remove('locked-skill');
                } else {
                    document.getElementById('mp-3').innerText = '???';
                    document.getElementById('mp-3').classList.add('locked-skill');
                }

                if (gData.lightningActive) {
                    document.getElementById('mp-3-extra').style.display = 'block';
                    document.getElementById('mp-slash').style.display = 'block';
                    document.getElementById('mp-3-extra').innerText = '라이트닝';
                    document.getElementById('mp-3-extra').classList.remove('locked-skill');
                    document.getElementById('mp-3').style.left = '980px'; 
                } else {
                    document.getElementById('mp-3-extra').style.display = 'none';
                    document.getElementById('mp-slash').style.display = 'none';
                    document.getElementById('mp-3').style.left = '1030px'; 
                }
            }
        }
    </script>
</body>
</html>
