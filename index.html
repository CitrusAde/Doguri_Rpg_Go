<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doguri's Adventure</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('Data/DungGeunMo.ttf') format('truetype');
        }

        body {
            margin: 0; padding: 0; background-color: #111;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'DungGeunMo', sans-serif;
            overflow: hidden; color: #fff;
        }

        #game-container {
            position: relative; width: 1280px; height: 720px;
            background-size: cover; background-position: center;
            background-color: #222; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .screen.active { display: block; }
        
        .ui-element { position: absolute; object-fit: none; transform: translate(-50%, -50%); }
        
        .clickable { cursor: pointer; transition: transform 0.1s ease; }
        .clickable:active { transform: translate(-50%, -50%) scale(0.95) !important; filter: brightness(0.8); }
        
        .disabled { filter: grayscale(100%) brightness(0.5); pointer-events: none; }

        /* 게이지 바 */
        #hp-gauge, #mp-gauge, #monster-hp-gauge { transition: clip-path 0.2s ease-out; }
        
        /* 상태 텍스트 (체력/마나/타이머) */
        .status-text {
            position: absolute; transform: translate(-50%, -50%);
            font-size: 20px; font-weight: bold; color: #fff; z-index: 3;
            text-shadow: 1.5px 1.5px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }

        /* 몬스터 공격 타이머 게이지 */
        #monster-gauge-img {
            z-index: 5; filter: sepia(1) hue-rotate(320deg) saturate(5) brightness(0.6);
            clip-path: inset(100% 0 0 0); pointer-events: none;
        }

        /* 몬스터 말풍선 */
        #monster-chat {
            position: absolute; left: 700px; top: 250px; background: #fff; color: #000;
            padding: 15px 25px; border-radius: 20px; font-size: 24px; max-width: 300px;
            z-index: 10; display: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transform: translate(0, -50%);
        }
        #monster-chat::before {
            content: ''; position: absolute; bottom: -15px; left: 30px;
            border-width: 15px 15px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        /* 타이핑 입력 창 */
        #typing-input {
            position: absolute; left: 640px; top: 639.5px; transform: translate(-50%, -50%);
            background: transparent; border: none; color: #fff;
            font-size: 30px; font-family: 'DungGeunMo', sans-serif;
            text-align: center; outline: none; width: 350px; z-index: 20;
        }

        /* 팝업 UI */
        #popup-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; display: none;
        }
        .popup-text {
            position: absolute; left: 640px; top: 320px; width: 358px; height: 200px;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; text-align: center;
            font-size: 30px; color: #fff; z-index: 102; pointer-events: none;
        }

        /* 스킬 텍스트 공통 */
        .skill-text {
            position: absolute; transform: translate(-50%, -50%); font-size: 26px; font-weight: bold; z-index: 10;
            background: linear-gradient(to top, #fff var(--fill, 100%), #444 var(--fill, 100%));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: left 0.3s ease; 
        }
        .locked-skill { color: #555 !important; background: none !important; -webkit-text-fill-color: #555 !important; }

        /* 물리 스킬 */
        #py-1 { left: 250px; top: 580.5px; }
        #py-1-extra { left: 310px; top: 580.5px; display: none; }
        #py-2 { left: 250px; top: 610.5px; }
        #py-3 { left: 250px; top: 640.5px; }

        /* 마법 스킬 */
        #mp-1 { left: 1030px; top: 580.5px; }
        #mp-2 { left: 1030px; top: 610.5px; }
        #mp-3 { left: 1030px; top: 640.5px; }

        /* 흔들림 애니메이션 */
        @keyframes shake-monster-anim {
            0% { transform: translate(-50%, -50%) translate(0, 0); }
            20% { transform: translate(-50%, -50%) translate(-10px, 0); }
            40% { transform: translate(-50%, -50%) translate(10px, 0); }
            60% { transform: translate(-50%, -50%) translate(-10px, 0); }
            80% { transform: translate(-50%, -50%) translate(10px, 0); }
            100% { transform: translate(-50%, -50%) translate(0, 0); }
        }
        @keyframes shake-screen-anim {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(5px, 5px); }
            100% { transform: translate(0, 0); }
        }
        .shake-monster { animation: shake-monster-anim 0.2s ease-in-out; }
        .shake-screen { animation: shake-screen-anim 0.2s ease-in-out; }

    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- 공통 상단 버튼 -->
        <img id="stop-btn" src="Data/DR_Stop_Button.png" class="ui-element clickable" style="left: 82px; top: 84.5px; display: none; z-index: 100;" onclick="togglePause()" alt="Pause">
        <img id="back-btn" src="Data/DR_Back_Button.png" class="ui-element clickable" style="left: 1130px; top: 85px; display: none; z-index: 100;" onclick="goBack()" alt="Back">

        <!-- 1. 시작 화면 -->
        <div id="start-screen" class="screen active">
            <img src="Data/DR_Logo.png" class="ui-element" style="left: 640px; top: 258px;" alt="Logo">
            <img src="Data/DR_Start_Button.png" class="ui-element clickable" style="left: 640px; top: 567px;" onclick="switchScreen('diff-screen')" alt="Start">
        </div>

        <!-- 2. 난이도 선택 화면 -->
        <div id="diff-screen" class="screen">
            <img src="Data/DR_Easy_Button.png" id="diff-1" class="ui-element clickable" style="left: 220px; top: 280px;" onclick="selectDiff(1)" alt="Easy">
            <img src="Data/DR_Normal_Button.png" id="diff-2" class="ui-element clickable" style="left: 500px; top: 280px;" onclick="selectDiff(2)" alt="Normal">
            <img src="Data/DR_Hard_Button.png" id="diff-3" class="ui-element clickable" style="left: 780px; top: 280px;" onclick="selectDiff(3)" alt="Hard">
            <img src="Data/DR_Extreme_Button.png" id="diff-4" class="ui-element disabled" style="left: 1060px; top: 280px;" alt="Extreme">
            
            <img src="Data/DR_Play_Button.png" class="ui-element clickable" style="left: 640px; top: 567px;" onclick="startGame()" alt="Play">
        </div>

        <!-- 3. 게임 플레이 화면 -->
        <div id="game-screen" class="screen">
            
            <div style="position:absolute; left:40px; top:120px; font-size:30px; color:#ffd700; z-index:10;">Gold: <span id="gold-val">0</span></div>

            <!-- 몬스터 체력 바 및 이름표 -->
            <img id="monster-hp-bg" src="Data/DR_Monster_Hp_Bg.png" class="ui-element" style="left: 640px; top: 126px; z-index: 6;">
            <img id="monster-hp-gauge" src="Data/DR_Monster_Hp_Gauge.png" class="ui-element" style="left: 640px; top: 126px; z-index: 6;">
            <img id="monster-name-tag" src="Data/DR_Monster_Kobold_Name.png" class="ui-element" style="left: 640px; top: 160px; z-index: 6;">

            <!-- 몬스터 영역 및 그림자 -->
            <img id="monster-shadow" src="Data/DR_Monster_Shadow.png" class="ui-element" style="left: 645.5px; top: 440px; z-index: 3;">
            <img id="monster-img" src="" class="ui-element" style="left: 640px; top: 337px; z-index: 4;">
            <img id="monster-gauge-img" src="" class="ui-element" style="left: 640px; top: 337px;">
            <div id="monster-chat"></div>

            <!-- 플레이어 상태 UI 배경/게이지/텍스트 -->
            <img src="Data/DR_HP_Bg.png" class="ui-element" style="left: 250px; top: 470.5px; z-index: 1;">
            <img id="hp-gauge" src="Data/DR_HP_Gauge.png" class="ui-element" style="left: 269.5px; top: 470px; z-index: 2;">
            <div id="hp-text" class="status-text" style="left: 269.5px; top: 470px;">10/10</div>
            
            <img src="Data/DR_MP_Bg.png" class="ui-element" style="left: 1030px; top: 470px; z-index: 1;">
            <img id="mp-gauge" src="Data/DR_MP_Gauge.png" class="ui-element" style="left: 1047.5px; top: 470.5px; z-index: 2;">
            <div id="mp-text" class="status-text" style="left: 1047.5px; top: 470.5px;">10/10</div>

            <!-- 스킬 UI 배경 -->
            <img src="Data/DR_Py_Attack_Bg.png" class="ui-element" style="left: 250px; top: 595px; z-index: 1;">
            <img src="Data/DR_Mp_Attack_Bg.png" class="ui-element" style="left: 1030.5px; top: 595px; z-index: 1;">
            
            <img src="Data/DR_Text_Attack_Bg.png" class="ui-element" style="left: 640px; top: 624.5px; z-index: 1;">
            <img src="Data/DR_Mychat.png" class="ui-element" style="left: 640px; top: 524.5px; z-index: 1;">
            <div id="player-chat-text"></div> 
            
            <!-- 타이머 영역 -->
            <img src="Data/DR_Attack_Time.png" class="ui-element" style="left: 640.5px; top: 671px; z-index: 1;">
            <div id="timer-text" class="status-text" style="left: 640.5px; top: 671px; font-size: 24px; color: #ff5555; z-index: 2;">01:00</div>

            <!-- 중앙 타이핑 입력창 -->
            <input type="text" id="typing-input" autocomplete="off" spellcheck="false" placeholder="스킬 입력">

            <!-- 스킬 텍스트 -->
            <div id="py-1" class="skill-text">베기</div>
            <div id="py-1-extra" class="skill-text">연속 베기</div>
            <div id="py-2" class="skill-text">찌르기</div>
            <div id="py-3" class="skill-text">방어</div>

            <div id="mp-1" class="skill-text">매직 애로우</div>
            <div id="mp-2" class="skill-text">파이어볼</div>
            <div id="mp-3" class="skill-text">쉴드</div>
        </div>

        <!-- 4. 팝업 및 게임오버 레이어 -->
        <div id="popup-layer" onclick="handlePopupClick(event)">
            <img src="Data/DR_Item_Popup.png" class="ui-element" style="left: 640px; top: 320px; z-index: 101; pointer-events: none;">
            <div id="popup-text" class="popup-text"></div>
            
            <!-- 버튼들 -->
            <img id="popup-next-btn" src="Data/DR_Next_Button.png" class="ui-element clickable" style="left: 640px; top: 460px; z-index: 103; display: none;" onclick="nextStage(event)" alt="Next">
            <img id="popup-gameover-btn" src="Data/DR_Gameover_Button.png" class="ui-element clickable" style="left: 640px; top: 460px; z-index: 103; display: none;" onclick="goBack(event)" alt="Game Over">
        </div>

    </div>

    <script>
        /* =================================================================
           데이터 및 설정
        ================================================================= */
        const BG_MAP = {
            main: 'url("Data/DR_Main_Bg.png")',
            select: 'url("Data/DR_Game_Select_Bg.png")',
            bgList: {
                1: ['url("Data/DR_Easy_stage_1_Bg.png")', 'url("Data/DR_Easy_stage_2_Bg.png")'],
                2: ['url("Data/DR_Normal_stage_1_Bg.png")', 'url("Data/DR_Normal_stage_2_Bg.png")'],
                3: ['url("Data/DR_Hard_stage_1_Bg.png")', 'url("Data/DR_Hard_stage_2_Bg.png")']
            }
        };

        const SKILLS = {
            '베기': { type: 'py', dmg: 1, cd: 1000, mp: 0, el: 'py-1' },
            '연속 베기': { type: 'py', dmg: 3, cd: 2000, mp: 0, el: 'py-1-extra', reqFlag: 'hasCombo' },
            '찌르기': { type: 'py', dmg: 1, cd: 2000, mp: 0, el: 'py-2' },
            '방어': { type: 'py', dmg: 0, cd: 2000, mp: 0, el: 'py-3' },
            '매직 애로우': { type: 'mp', dmg: 2, cd: 2000, mp: 2, el: 'mp-1' },
            '파이어볼': { type: 'mp', dmg: 3, cd: 3000, mp: 3, el: 'mp-2', reqFlag: 'fireballActive' },
            '쉴드': { type: 'mp', dmg: 0, cd: 2000, mp: 2, el: 'mp-3' }
        };

        const STAGE_DATA = {
            1: [ 
                { id: 'kobold', hp: 5, atk: 1, cd: 5000, img: 'DR_Monster_Kobold.png', bgIdx: 0 },
                { id: 'goblin', hp: 7, atk: 1, cd: 4000, img: 'DR_Monster_Goblin.png', bgIdx: 0 },
                { id: 'orc', hp: 9, atk: 1, cd: 4000, img: 'DR_Monster_Orc.png', bgIdx: 0 },
                { id: 'highorc', hp: 12, atk: 2, cd: 4000, img: 'DR_Monster_High_Orc.png', isBoss: true, bgIdx: 0 },
                { id: 'slime', hp: 5, atk: 1, cd: 5000, img: 'DR_Monster_Slime.png', bgIdx: 1 },
                { id: 'swarm1', hp: 5, atk: 2, cd: 4000, img: 'DR_Monster_Swarm.png', bgIdx: 1 },
                { id: 'ghoul', hp: 9, atk: 1, cd: 4000, img: 'DR_Monster_Ghoul.png', dropItem: '마법 지팡이', bgIdx: 1 },
                { id: 'troll', hp: 20, atk: 2, cd: 3000, img: 'DR_Monster_Troll.png', isBoss: true, bgIdx: 1 }
            ],
            2: [ 
                { id: 'swarm2', hp: 8, atk: 3, cd: 4000, img: 'DR_Monster_Swarm.png', bgIdx: 0 },
                { id: 'golem', hp: 15, atk: 2, cd: 4000, img: 'DR_Monster_Golem.png', bgIdx: 0 },
                { id: 'spider', hp: 10, atk: 1, cd: 3000, img: 'DR_Monster_Spider.png', bgIdx: 0 },
                { id: 'scorpion', hp: 25, atk: 3, cd: 3000, img: 'DR_Monster_Spider.png', isBoss: true, bgIdx: 0 },
                { id: 'wolf', hp: 10, atk: 2, cd: 4000, img: 'DR_Monster_Scorpion.png', bgIdx: 1 },
                { id: 'harpy', hp: 15, atk: 3, cd: 3000, img: 'DR_Monster_Harpy.png', bgIdx: 1 },
                { id: 'mandragora', hp: 10, atk: 4, cd: 3000, img: 'DR_Monster_Mandragora.png', bgIdx: 1 },
                { id: 'griffin', hp: 15, atk: 2, cd: 3000, img: 'DR_Monster_Griffin.png', isBoss: true, bgIdx: 1 }
            ],
            3: [ 
                { id: 'skeleton', hp: 15, atk: 2, cd: 2000, img: 'DR_Monster_Skeleton.png', bgIdx: 0 },
                { id: 'gargoyle', hp: 15, atk: 5, cd: 3000, img: 'DR_Monster_Gargoyle.png', bgIdx: 0 },
                { id: 'dullahan', hp: 30, atk: 3, cd: 3000, img: 'DR_Monster_Dullahan.png', isBoss: true, bgIdx: 0 },
                { id: 'succubus', hp: 20, atk: 5, cd: 3000, img: 'DR_Monster_Succubus.png', bgIdx: 1 },
                { id: 'demon', hp: 40, atk: 10, cd: 3000, img: 'DR_Monster_Demon.png', isBoss: true, bgIdx: 1 }
            ]
        };

        let gameState = 'START'; 
        let unlockedDiff = 1; // 클리어하여 해금된 난이도 (1: 쉬움부터 시작)
        let currentDiff = 1;
        let selectedDiff = 1;
        let monsterIdx = 0;
        
        let player = { maxHp: 10, hp: 10, maxMp: 10, mp: 10, gold: 0, cooldowns: {}, flags: {}, isDefending: false, stunTimer: 0 };
        let monster = null;
        
        let lastTime = 0;
        let monsterAttackTimer = 0;
        let mpRegenTimer = 0;
        let monsterStunTimer = 0;
        let stageTimer = 60000; // 1분
        let gameLoopId = null;

        const container = document.getElementById('game-container');
        const inputEl = document.getElementById('typing-input');
        container.style.backgroundImage = BG_MAP.main;

        /* =================================================================
           키보드 조작 (스페이스바 및 숫자키)
        ================================================================= */
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (gameState === 'START') {
                    switchScreen('diff-screen');
                } else if (gameState === 'DIFF') {
                    startGame();
                } else if (gameState === 'POPUP') {
                    if (document.getElementById('popup-next-btn').style.display === 'block') nextStage();
                } else if (gameState === 'GAMEOVER') {
                    if (document.getElementById('popup-gameover-btn').style.display === 'block') goBack();
                } else if (gameState === 'DIFF_ALERT') {
                    // 경고 팝업 닫기
                    gameState = 'DIFF';
                    document.getElementById('popup-layer').style.display = 'none';
                }
            } 
            else if (gameState === 'DIFF') {
                if (['1', '2', '3', '4'].includes(e.key)) {
                    selectDiff(parseInt(e.key));
                }
            }
        });

        /* =================================================================
           UI 및 화면 전환 컨트롤
        ================================================================= */
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.getElementById('back-btn').style.display = (screenId === 'start-screen') ? 'none' : 'block';
            document.getElementById('stop-btn').style.display = (screenId === 'game-screen') ? 'block' : 'none';

            inputEl.value = ''; // 입력창 초기화

            if (screenId === 'start-screen') {
                gameState = 'START'; container.style.backgroundImage = BG_MAP.main;
            } else if (screenId === 'diff-screen') {
                gameState = 'DIFF'; container.style.backgroundImage = BG_MAP.select;
                selectDiff(selectedDiff);
            }
        }

        function selectDiff(diff) {
            if (diff === 4) return;
            selectedDiff = diff;
            for(let i=1; i<=3; i++) {
                document.getElementById(`diff-${i}`).style.filter = (i === diff) ? 'brightness(1.2) drop-shadow(0 0 10px #ff0)' : 'none';
            }
        }

        function goBack(e) {
            if(e) e.stopPropagation();
            inputEl.value = ''; // 타이핑 리셋
            inputEl.blur();
            if (gameState === 'DIFF') switchScreen('start-screen');
            else if (['GAME', 'PAUSE', 'GAMEOVER', 'POPUP'].includes(gameState)) { 
                stopGameLoop(); 
                document.getElementById('popup-layer').style.display = 'none';
                switchScreen('diff-screen'); 
            }
        }

        function togglePause() {
            if (gameState === 'GAME') {
                gameState = 'PAUSE';
                showPopup('일시 정지\n\n(아무 곳이나 눌러 재개)', 'PAUSE');
            } 
        }

        function handlePopupClick(e) {
            if (gameState === 'PAUSE') {
                gameState = 'GAME';
                document.getElementById('popup-layer').style.display = 'none';
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
                inputEl.focus();
            } else if (gameState === 'DIFF_ALERT') {
                gameState = 'DIFF';
                document.getElementById('popup-layer').style.display = 'none';
            }
        }

        function showPopup(text, type = 'PAUSE') {
            document.getElementById('popup-layer').style.display = 'block';
            document.getElementById('popup-text').innerText = text;
            
            document.getElementById('popup-next-btn').style.display = (type === 'NEXT') ? 'block' : 'none';
            document.getElementById('popup-gameover-btn').style.display = (type === 'GAMEOVER') ? 'block' : 'none';
        }

        function triggerMonsterShake() {
            const mImg = document.getElementById('monster-img');
            const mGauge = document.getElementById('monster-gauge-img');
            mImg.classList.remove('shake-monster'); mGauge.classList.remove('shake-monster');
            void mImg.offsetWidth; 
            mImg.classList.add('shake-monster'); mGauge.classList.add('shake-monster');
        }
        function triggerScreenShake() {
            const screen = document.getElementById('game-container');
            screen.classList.remove('shake-screen');
            void screen.offsetWidth;
            screen.classList.add('shake-screen');
        }

        function updateTimerUI() {
            let totalSeconds = Math.ceil(Math.max(0, stageTimer) / 1000);
            let m = Math.floor(totalSeconds / 60);
            let s = totalSeconds % 60;
            document.getElementById('timer-text').innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
        }

        /* =================================================================
           게임 흐름 로직
        ================================================================= */
        function startGame() {
            if (selectedDiff > unlockedDiff) {
                gameState = 'DIFF_ALERT';
                showPopup('이전 난이도 클리어 해야 가능', 'PAUSE'); // 버튼 없는 경고 팝업
                return;
            }

            inputEl.value = ''; // 입력창 초기화
            currentDiff = selectedDiff;
            monsterIdx = 0;
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            player.flags = { blockCount: 0, dullahanBlock: 0, griffinHits: 0 };
            
            Object.keys(SKILLS).forEach(k => player.cooldowns[k] = 0);
            updateStatusUI();
            
            switchScreen('game-screen');
            loadMonster();
            
            gameState = 'GAME';
            lastTime = performance.now();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function loadMonster() {
            let mData = STAGE_DATA[currentDiff] ? STAGE_DATA[currentDiff][monsterIdx] : null;
            if (!mData) { 
                unlockedDiff = Math.max(unlockedDiff, currentDiff + 1); // 난이도 해금
                gameState = 'GAMEOVER'; 
                showPopup('난이도 클리어!', 'GAMEOVER'); 
                inputEl.blur();
                return; 
            }
            
            monster = { ...mData, maxHp: mData.hp }; 
            monsterAttackTimer = 0;
            monsterStunTimer = 0;
            stageTimer = 60000; // 스테이지 당 1분 리셋
            
            document.getElementById('monster-img').style.display = 'block';
            document.getElementById('monster-gauge-img').style.display = 'block';
            document.getElementById('monster-shadow').style.display = 'block';
            document.getElementById('monster-hp-bg').style.display = 'block';
            document.getElementById('monster-hp-gauge').style.display = 'block';
            document.getElementById('monster-name-tag').style.display = 'block';

            document.getElementById('monster-img').src = `Data/${monster.img}`;
            document.getElementById('monster-gauge-img').src = `Data/${monster.img}`;
            container.style.backgroundImage = BG_MAP.bgList[currentDiff][monster.bgIdx];
            
            updateSkillUI();
            updateMonsterHpUI();
            updateTimerUI();
        }

        function nextStage(e) {
            if(e) e.stopPropagation(); 
            document.getElementById('popup-layer').style.display = 'none';
            monsterIdx++;
            loadMonster();
            if(gameState !== 'POPUP') return;
            gameState = 'GAME';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
            inputEl.focus();
        }

        function stopGameLoop() {
            if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
        }

        /* =================================================================
           전투 메인 루프
        ================================================================= */
        function gameLoop(currentTime) {
            if (gameState !== 'GAME') return;
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            // 1분 타이머 처리
            stageTimer -= dt;
            updateTimerUI();
            if (stageTimer <= 0) {
                gameState = 'GAMEOVER';
                inputEl.blur();
                showPopup('시간 초과! 게임 오버!', 'GAMEOVER');
                return;
            }

            if (player.stunTimer > 0) player.stunTimer -= dt;
            if (monsterStunTimer > 0) monsterStunTimer -= dt;

            // 몬스터 공격 타이머
            if (monsterStunTimer <= 0 && monster.hp > 0) {
                monsterAttackTimer += dt;
                let ratio = Math.min(1, monsterAttackTimer / monster.cd);
                document.getElementById('monster-gauge-img').style.clipPath = `inset(${100 - (ratio * 100)}% 0 0 0)`;

                if (monsterAttackTimer >= monster.cd) {
                    monsterAttackTimer = 0;
                    monsterAttacksPlayer();
                }
            }

            // MP 리젠
            mpRegenTimer += dt;
            if (mpRegenTimer >= 1000) {
                player.mp = Math.min(player.maxMp, player.mp + 1);
                updateStatusUI();
                mpRegenTimer -= 1000;
            }

            // 스킬 쿨타임 시각화
            for (const [sName, sData] of Object.entries(SKILLS)) {
                if (!sData.el) continue;
                let timePassed = currentTime - player.cooldowns[sName];
                let cdPercent = Math.min(100, (timePassed / sData.cd) * 100);
                let el = document.getElementById(sData.el);
                if (el) el.style.setProperty('--fill', `${cdPercent}%`);
            }

            if(document.activeElement !== inputEl) inputEl.focus();
            
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        inputEl.addEventListener('keydown', (e) => {
            if (gameState !== 'GAME') {
                e.preventDefault(); 
                return; 
            }

            if (e.key === 'Enter') {
                const word = e.target.value.trim();
                const now = performance.now();
                if (player.stunTimer > 0) { e.target.value = ''; return; }

                if (SKILLS[word]) {
                    let s = SKILLS[word];
                    
                    if (s.type === 'mp' && currentDiff === 1) { e.target.value = ''; return; }
                    if (s.reqFlag && !player.flags[s.reqFlag]) { e.target.value = ''; return; }
                    
                    if (now - player.cooldowns[word] >= s.cd && player.mp >= s.mp) {
                        player.cooldowns[word] = now;
                        player.mp -= s.mp;
                        player.isDefending = false;
                        
                        if (word === '방어' || word === '쉴드') {
                            player.isDefending = true;
                            player.currentDefSkill = word;
                        } else {
                            playerAttacksMonster(word, s);
                        }
                        updateStatusUI();
                    }
                }
                e.target.value = '';
            }
        });

        function playerAttacksMonster(skillName, skillData) {
            let dmg = skillData.dmg;
            
            triggerMonsterShake();
            const hitLines = ["크악!", "아프다!", "이놈이!", "제법이군.."];
            showMonsterChat(hitLines[Math.floor(Math.random() * hitLines.length)]);

            monster.hp -= dmg;
            updateMonsterHpUI();

            if (monster.hp <= 0) monsterDeath();
        }

        function monsterAttacksPlayer() {
            let dmg = monster.atk;
            if (player.isDefending) {
                dmg = 0;
                player.isDefending = false; 
            }

            if (dmg > 0) {
                player.hp -= dmg;
                updateStatusUI();
                triggerScreenShake(); 
                
                if (monster.id === 'highorc' && !player.flags.hasCombo) {
                    player.flags.hasCombo = true;
                    showMonsterChat("크하하! 겨우 그정도냐!");
                    updateSkillUI();
                }

                if (player.hp <= 0) {
                    gameState = 'GAMEOVER';
                    inputEl.blur(); 
                    showPopup('게임 오버!', 'GAMEOVER');
                }
            }
        }

        function monsterDeath() {
            document.getElementById('monster-img').style.display = 'none';
            document.getElementById('monster-gauge-img').style.display = 'none';
            document.getElementById('monster-shadow').style.display = 'none';
            document.getElementById('monster-hp-bg').style.display = 'none';
            document.getElementById('monster-hp-gauge').style.display = 'none';
            document.getElementById('monster-name-tag').style.display = 'none';

            player.gold += 1;
            document.getElementById('gold-val').innerText = player.gold;
            
            let popText = `골드 +1 획득!`;
            if (monster.dropItem) {
                popText += `\n${monster.dropItem} 획득!`;
                if (monster.dropItem === '마법 지팡이') player.flags.hasStaff = true;
            }

            gameState = 'POPUP';
            showPopup(popText, 'NEXT');
        }

        /* =================================================================
           UI 렌더링 업데이트 함수들
        ================================================================= */
        function updateStatusUI() {
            let hpRatio = Math.max(0, player.hp / player.maxHp);
            document.getElementById('hp-gauge').style.clipPath = `inset(0 ${100 - hpRatio * 100}% 0 0)`;
            document.getElementById('hp-text').innerText = `${player.hp}/${player.maxHp}`;
            
            let mpRatio = Math.max(0, player.mp / player.maxMp);
            document.getElementById('mp-gauge').style.clipPath = `inset(0 ${100 - mpRatio * 100}% 0 0)`;
            document.getElementById('mp-text').innerText = `${player.mp}/${player.maxMp}`;
        }

        function updateMonsterHpUI() {
            let ratio = Math.max(0, monster.hp / monster.maxHp);
            document.getElementById('monster-hp-gauge').style.clipPath = `inset(0 ${100 - ratio * 100}% 0 0)`;
        }

        function updateSkillUI() {
            if (player.flags.hasCombo) {
                document.getElementById('py-1').style.left = '190px';
                document.getElementById('py-1-extra').style.display = 'block';
            } else {
                document.getElementById('py-1').style.left = '250px';
                document.getElementById('py-1-extra').style.display = 'none';
            }
            
            if (currentDiff === 1) {
                ['mp-1', 'mp-2', 'mp-3'].forEach(id => {
                    let el = document.getElementById(id);
                    el.innerText = '???';
                    el.classList.add('locked-skill');
                });
            } else {
                document.getElementById('mp-1').innerText = '매직 애로우';
                document.getElementById('mp-1').classList.remove('locked-skill');
                document.getElementById('mp-3').innerText = '쉴드';
                document.getElementById('mp-3').classList.remove('locked-skill');
                
                let fbEl = document.getElementById('mp-2');
                if (player.flags.fireballActive || player.flags.hasStaff) {
                    fbEl.innerText = '파이어볼';
                    fbEl.classList.remove('locked-skill');
                } else {
                    fbEl.innerText = '???';
                    fbEl.classList.add('locked-skill');
                }
            }
        }

        function showMonsterChat(text) {
            const chatBox = document.getElementById('monster-chat');
            chatBox.style.display = 'block';
            chatBox.innerText = text;
            setTimeout(() => chatBox.style.display = 'none', 1500);
        }
    </script>
</body>
</html>
