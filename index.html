<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doguri's Adventure</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('Data/DungGeunMo.ttf') format('truetype');
        }

        body {
            margin: 0; padding: 0; background-color: #111;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'DungGeunMo', sans-serif;
            overflow: hidden; color: #fff;
        }

        #game-container {
            position: relative; width: 1280px; height: 720px;
            background-size: cover; background-position: center;
            background-color: #222; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .screen.active { display: block; }
        
        .ui-element { position: absolute; object-fit: none; transform: translate(-50%, -50%); }
        
        .clickable { cursor: pointer; transition: transform 0.1s ease; }
        .clickable:active { transform: translate(-50%, -50%) scale(0.95) !important; filter: brightness(0.8); }
        
        .locked-diff { filter: brightness(0.3); }

        /* 무기 UI 및 애니메이션 설정 */
        .weapon-ui {
            position: absolute; z-index: 0; transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
        }
        #weapon-shield { left: 64px; top: 680px; }
        #weapon-shield.active { left: 365px; top: 560px; transform: translate(-50%, -50%) rotate(15deg); }

        #weapon-sword { left: 1147px; top: 622px; }
        #weapon-sword.active { left: 1019px; top: 543px; }

        #weapon-staff { left: 1196px; top: 600px; display: none; }
        #weapon-staff.active { left: 1075px; top: 486px; }

        /* 공격/피격 이펙트 (시퀀스 스프라이트) */
        .vfx-sprite {
            position: absolute; left: 640px; top: 337px;
            width: 250px; height: 250px; transform: translate(-50%, -50%);
            background-size: 200% 200%; z-index: 15; display: none; pointer-events: none;
        }
        #attack-vfx { background-image: url('Data/DR_Slash_Attack_fx.png'); }
        #hit-vfx { background-image: url('Data/DR_Hit_fx_1.png'); z-index: 16; }

        /* 피격 시 붉은 화면 레이어 */
        #red-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: red; opacity: 0; z-index: 99; pointer-events: none;
            transition: opacity 0.1s ease;
        }

        /* 몬스터 사망 효과 */
        .monster-dead {
            filter: brightness(0) !important;
            opacity: 0;
            transition: all 0.5s ease;
        }

        #hp-gauge, #mp-gauge, #monster-hp-gauge, #attack-time-gauge { transition: clip-path 0.2s ease-out; }
        
        .status-text {
            position: absolute; transform: translate(-50%, -50%);
            font-size: 20px; font-weight: bold; color: #fff; z-index: 3;
            text-shadow: 1.5px 1.5px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }

        #monster-gauge-img {
            z-index: 5; filter: sepia(1) hue-rotate(320deg) saturate(5) brightness(0.6);
            clip-path: inset(100% 0 0 0); pointer-events: none;
        }

        /* 대사 폰트 5px 감소 및 굵게 유지 */
        #monster-chat {
            position: absolute; left: 700px; top: 250px; background: #fff; color: #000;
            padding: 15px 25px; border-radius: 20px; font-size: 19px; max-width: 300px;
            z-index: 10; display: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transform: translate(0, -50%); white-space: pre-wrap; font-weight: bold;
        }
        #monster-chat::before {
            content: ''; position: absolute; bottom: -15px; left: 30px;
            border-width: 15px 15px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        #player-chat-text {
            position: absolute; left: 640px; top: 524.5px; width: 400px; height: 60px;
            transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center;
            font-size: 19px; color: #fff; z-index: 20; display: none; white-space: pre-wrap; font-weight: bold;
        }

        #typing-input {
            position: absolute; left: 640px; top: 639.5px; transform: translate(-50%, -50%);
            background: transparent; border: none; color: #fff;
            font-size: 30px; font-family: 'DungGeunMo', sans-serif;
            text-align: center; outline: none; width: 350px; z-index: 20;
        }

        .popup-text {
            position: absolute; left: 640px; top: 320px; width: 358px; height: 200px;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            font-size: 30px; color: #fff; z-index: 102; pointer-events: none;
            white-space: pre-wrap; line-height: 1.5;
        }

        .skill-text {
            position: absolute; transform: translate(-50%, -50%); font-size: 26px; font-weight: bold; z-index: 10;
            background: linear-gradient(to top, #fff var(--fill, 100%), #444 var(--fill, 100%));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: left 0.3s ease; 
        }
        .locked-skill { color: #555 !important; background: none !important; -webkit-text-fill-color: #555 !important; }

        #py-1 { left: 250px; top: 580.5px; }
        #py-1-extra { left: 310px; top: 580.5px; display: none; }
        #py-2 { left: 250px; top: 610.5px; }
        #py-3 { left: 250px; top: 640.5px; }
        #mp-1 { left: 1030px; top: 580.5px; }
        #mp-2 { left: 1030px; top: 610.5px; }
        #mp-3 { left: 1030px; top: 640.5px; }

        /* 흔들림 애니메이션 */
        @keyframes shake-anim {
            0%, 100% { transform: translate(-50%, -50%) translate(0, 0); }
            25% { transform: translate(-50%, -50%) translate(-10px, 0); }
            50% { transform: translate(-50%, -50%) translate(10px, 0); }
            75% { transform: translate(-50%, -50%) translate(-10px, 0); }
        }
        @keyframes shake-screen-anim {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-8px, 8px); }
            50% { transform: translate(8px, -8px); }
            75% { transform: translate(-8px, -8px); }
        }
        @keyframes block-screen-anim {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-3px, 0); }
            66% { transform: translate(3px, 0); }
        }
        .shake-monster { animation: shake-anim 0.2s ease-in-out; }
        .shake-screen { animation: shake-screen-anim 0.2s ease-in-out; }
        .block-screen { animation: block-screen-anim 0.15s ease-in-out; }

    </style>
</head>
<body>

        ];

        let gameState = 'START'; 
        let unlockedDiff = 1; 
        let currentDiff = 1;
        let selectedDiff = 1;
        let monsterIdx = 0;
        
        let player = { maxHp: 10, hp: 10, maxMp: 10, mp: 10, gold: 0, bonusPyAtk: 0, cooldowns: {}, flags: {}, isDefending: false, stunTimer: 0 };
        let monster = null;
        let selectedMarketItem = null;
        
        let lastTime = 0, monsterAttackTimer = 0, mpRegenTimer = 0, monsterStunTimer = 0;
        let stageTimer = 60000; 
        let gameLoopStarted = false; 

        const container = document.getElementById('game-container');
        const inputEl = document.getElementById('typing-input');
        container.style.backgroundImage = BG_MAP.main;

        function playAudio(id) {
            const el = document.getElementById(id);
            if(el) { el.currentTime = 0; el.play().catch(()=>{}); }
        }

        /* =================================================================
           키보드 조작
        ================================================================= */
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (gameState === 'START') { switchScreen('diff-screen'); } 
                else if (gameState === 'DIFF') { startGame(); } 
                else if (gameState === 'POPUP') {
                    if (document.getElementById('popup-next-btn').style.display === 'block') handlePopupNext();
                } else if (gameState === 'GAMEOVER') {
                    if (document.getElementById('popup-gameover-btn').style.display === 'block') goBack();
                } else if (gameState === 'ALERT') {
                    document.getElementById('popup-layer').style.display = 'none';
                    gameState = 'DIFF';
                } else if (gameState === 'MARKET') {
                    closeMarketAndNext();
                }
            } 
            else if (gameState === 'DIFF') {
                if (['1', '2', '3', '4'].includes(e.key)) handleDiffClick(parseInt(e.key));
            }
            else if (gameState === 'MARKET') {
                if (['1', '2', '3'].includes(e.key)) {
                    openMarketInfo(parseInt(e.key) - 1);
                }
            }
        });

        /* =================================================================
           UI 및 화면 전환 컨트롤
        ================================================================= */
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.getElementById('back-btn').style.display = (screenId === 'start-screen') ? 'none' : 'block';
            document.getElementById('stop-btn').style.display = (screenId === 'game-screen') ? 'block' : 'none';

            inputEl.value = '';

            if (screenId === 'start-screen') {
                gameState = 'START'; container.style.backgroundImage = BG_MAP.main;
            } else if (screenId === 'diff-screen') {
                gameState = 'DIFF'; container.style.backgroundImage = BG_MAP.select;
                updateDiffButtons();
            }
        }

        function handleDiffClick(diff) {
            if (diff > unlockedDiff) {
                gameState = 'ALERT';
                showPopup('이전 난이도\n클리어 필요', 'ALERT');
                return;
            }
            selectedDiff = diff;
            updateDiffButtons();
        }

        function updateDiffButtons() {
            for(let i=1; i<=4; i++) {
                let btn = document.getElementById(`diff-${i}`);
                if (i > unlockedDiff) btn.classList.add('locked-diff');
                else btn.classList.remove('locked-diff');
                
                if (i === selectedDiff) btn.style.filter = 'drop-shadow(0 0 15px #ff0)';
                else btn.style.filter = (i > unlockedDiff) ? 'brightness(0.3)' : 'none';
            }
        }

        function goBack(e) {
            if(e) e.stopPropagation();
            inputEl.value = ''; inputEl.blur();
            if (gameState === 'DIFF') switchScreen('start-screen');
            else if (['GAME', 'PAUSE', 'GAMEOVER', 'POPUP', 'TRANSITION', 'MARKET', 'MARKET_INFO'].includes(gameState)) { 
                document.getElementById('popup-layer').style.display = 'none';
                document.getElementById('market-layer').style.display = 'none';
                document.getElementById('market-info-layer').style.display = 'none';
                switchScreen('diff-screen'); 
            }
        }

        function togglePause() {
            if (gameState === 'GAME') {
                gameState = 'PAUSE';
                const pauseHTML = `일시 정지<br><span style="display:block; font-size:25px; color:#aaa; margin-top:5px; line-height:1;">(아무 곳이나 눌러 재개)</span>`;
                showPopup(pauseHTML, 'PAUSE', true);
            } 
        }

        function handlePopupClick(e) {
            if (gameState === 'PAUSE') {
                gameState = 'GAME';
                document.getElementById('popup-layer').style.display = 'none';
                lastTime = performance.now();
                inputEl.focus();
            } else if (gameState === 'ALERT') {
                gameState = 'DIFF';
                document.getElementById('popup-layer').style.display = 'none';
            }
        }

        function showPopup(text, type = 'PAUSE', isHTML = false) {
            document.getElementById('popup-layer').style.display = 'block';
            if (isHTML) document.getElementById('popup-text').innerHTML = text;
            else document.getElementById('popup-text').innerText = text;
            
            document.getElementById('popup-next-btn').style.display = (type === 'NEXT') ? 'block' : 'none';
            document.getElementById('popup-gameover-btn').style.display = (type === 'GAMEOVER') ? 'block' : 'none';
            document.getElementById('popup-bg-img').src = 'Data/DR_Item_Popup.png';
        }

        /* 이펙트 및 흔들림 연출 */
        function triggerMonsterShake() {
            const mImg = document.getElementById('monster-img');
            const mGauge = document.getElementById('monster-gauge-img');
            mImg.classList.remove('shake-monster'); mGauge.classList.remove('shake-monster');
            void mImg.offsetWidth; 
            mImg.classList.add('shake-monster'); mGauge.classList.add('shake-monster');
        }
        function triggerScreenShake() {
            const screen = document.getElementById('game-container');
            screen.classList.remove('shake-screen'); screen.classList.remove('block-screen');
            void screen.offsetWidth;
            screen.classList.add('shake-screen');
            
            const redFlash = document.getElementById('red-flash');
            redFlash.style.opacity = '0.4';
            setTimeout(() => { redFlash.style.opacity = '0'; }, 150);
        }
        function triggerBlockShake() {
            const screen = document.getElementById('game-container');
            screen.classList.remove('shake-screen'); screen.classList.remove('block-screen');
            void screen.offsetWidth;
            screen.classList.add('block-screen');
        }

        function playSpriteVFX(id) {
            const vfx = document.getElementById(id);
            vfx.style.display = 'block';
            let frame = 0;
            const frames = ['0% 0%', '100% 0%', '0% 100%', '100% 100%'];
            const interval = setInterval(() => {
                vfx.style.backgroundPosition = frames[frame];
                frame++;
                if (frame >= 4) {
                    clearInterval(interval);
                    vfx.style.display = 'none';
                }
            }, 50);
        }

        function updateTimerUI() {
            let totalSeconds = Math.ceil(Math.max(0, stageTimer) / 1000);
            let m = Math.floor(totalSeconds / 60);
            let s = totalSeconds % 60;
            let timerEl = document.getElementById('timer-text');
            timerEl.innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
            
            if (totalSeconds <= 10) timerEl.style.color = '#ff5555';
            else timerEl.style.color = '#fff';

            document.getElementById('attack-time-gauge').style.clipPath = `inset(0 ${100 - (stageTimer/60000)*100}% 0 0)`;
        }

        function playDialogue(mText, pText) {
            if (mText) {
                let mEl = document.getElementById('monster-chat');
                mEl.innerText = mText; mEl.style.display = 'block';
                setTimeout(() => { if (gameState !== 'GAMEOVER') mEl.style.display = 'none'; }, 3000);
            }
            if (pText) {
                let pEl = document.getElementById('player-chat-text');
                pEl.innerText = pText; pEl.style.display = 'flex';
                setTimeout(() => { if (gameState !== 'GAMEOVER') pEl.style.display = 'none'; }, 3000);
            }
        }

        /* =================================================================
           상점 시스템
        ================================================================= */
        function renderMarket() {
            const container = document.getElementById('market-items-container');
            container.innerHTML = '';
            const positions = [495, 640, 785];
            
            STORE_ITEMS.slice(0,3).forEach((item, idx) => {
                let x = positions[idx];
                container.innerHTML += `
                    <img src="Data/${item.img}" class="ui-element clickable" style="left:${x}px; top:260px;" onclick="openMarketInfo(${idx})">
                    <div class="ui-element" style="left:${x}px; top:360px; font-size:25px; color:#ffd700; text-shadow:2px 2px 0 #000; font-weight:bold;">${item.price} 골드</div>
                    <div class="ui-element" style="left:${x}px; top:180px; font-size:20px; color:#aaa; font-weight:bold;">[${idx+1}]</div>
                `;
            });
        }

        function showMarket() {
            gameState = 'MARKET';
            document.getElementById('market-layer').style.display = 'block';
            renderMarket();
        }

        function openMarketInfo(idx) {
            if(gameState !== 'MARKET') return;
            selectedMarketItem = STORE_ITEMS[idx];
            
            document.getElementById('info-item-img').src = `Data/${selectedMarketItem.img}`;
            document.getElementById('info-item-name').innerText = selectedMarketItem.name;
            
            // 8글자마다 줄바꿈
            let formattedDesc = selectedMarketItem.desc.match(/.{1,8}/g).join('\n');
            document.getElementById('info-item-desc').innerText = formattedDesc;
            
            gameState = 'MARKET_INFO';
            document.getElementById('market-info-layer').style.display = 'block';
            playAudio('sfx-buy');
        }

        function closeMarketInfo(e) {
            if(e) e.stopPropagation();
            gameState = 'MARKET';
            document.getElementById('market-info-layer').style.display = 'none';
        }

        function buyItem(e) {
            if(e) e.stopPropagation();
            if (player.gold >= selectedMarketItem.price) {
                player.gold -= selectedMarketItem.price;
                selectedMarketItem.action();
                document.getElementById('gold-val').innerText = player.gold;
                updateStatusUI();
                playAudio('sfx-buy');
                closeMarketInfo();
            } else {
                playAudio('sfx-err');
                alert("골드가 부족합니다!");
            }
        }

        function closeMarketAndNext(e) {
            if(e) e.stopPropagation();
            document.getElementById('market-layer').style.display = 'none';
            monsterIdx++;
            gameState = 'GAME';
            loadMonster();
            lastTime = performance.now();
            inputEl.focus();
        }

        /* =================================================================
           게임 흐름 로직
        ================================================================= */
        function startGame() {
            if (selectedDiff > unlockedDiff) {
                gameState = 'ALERT'; showPopup('이전 난이도\n클리어 필요', 'ALERT'); return;
            }

            inputEl.value = ''; 
            currentDiff = selectedDiff;
            monsterIdx = 0;
            player.hp = player.maxHp; player.mp = player.maxMp; player.bonusPyAtk = 0;
            player.flags = { blockCount: 0, dullahanBlock: 0, griffinHits: 0 };
            
            Object.keys(SKILLS).forEach(k => player.cooldowns[k] = 0);
            updateStatusUI();
            
            switchScreen('game-screen');
            loadMonster();
            
            gameState = 'GAME';
            lastTime = performance.now();
            playAudio('bgm');
            if (!gameLoopStarted) { requestAnimationFrame(gameLoop); gameLoopStarted = true; }
            inputEl.focus();
        }

        function loadMonster() {
            let mData = STAGE_DATA[currentDiff] ? STAGE_DATA[currentDiff][monsterIdx] : null;
            if (!mData) { 
                unlockedDiff = Math.max(unlockedDiff, currentDiff + 1); 
                gameState = 'GAMEOVER'; inputEl.blur();
                showPopup('난이도 클리어!', 'GAMEOVER'); return; 
            }
            
            monster = { ...mData, maxHp: mData.hp }; 
            monsterAttackTimer = 0; monsterStunTimer = 0; stageTimer = 60000; 
            
            // 보스 스케일링
            const scale = monster.isBoss ? 1.3 : 1;
            document.getElementById('monster-img').style.transform = `translate(-50%, -50%) scale(${scale})`;
            document.getElementById('monster-gauge-img').style.transform = `translate(-50%, -50%) scale(${scale})`;
            document.getElementById('monster-shadow').style.transform = `translate(-50%, -50%) scale(${scale})`;

            // 리셋 스타일 (죽음 효과 방지)
            const mImg = document.getElementById('monster-img');
            const mGauge = document.getElementById('monster-gauge-img');
            mImg.classList.remove('monster-dead'); mGauge.classList.remove('monster-dead');
            
            document.getElementById('monster-img').style.display = 'block';
            document.getElementById('monster-gauge-img').style.display = 'block';
            document.getElementById('monster-shadow').style.display = 'block';
            document.getElementById('monster-hp-bg').style.display = 'block';
            document.getElementById('monster-hp-gauge').style.display = 'block';
            document.getElementById('monster-name-tag').style.display = 'block';
            
            player.isDefending = false;
            document.getElementById('weapon-shield').classList.remove('active');

            mImg.src = `Data/${monster.img}`;
            mGauge.src = `Data/${monster.img}`;
            container.style.backgroundImage = BG_MAP.bgList[currentDiff][monster.bgIdx];
            
            updateSkillUI(); updateMonsterHpUI(); updateTimerUI();
            
            const dialog = STAGE_DIALOGUE[monster.id];
            if (dialog && dialog.intro) {
                playDialogue(dialog.intro.m, dialog.intro.p);
            }
        }

        function handlePopupNext(e) {
            if(e) e.stopPropagation();
            document.getElementById('popup-layer').style.display = 'none';
            
            let pText = document.getElementById('popup-text').innerText;
            if (pText.includes('연속 베기')) {
                gameState = 'GAME';
                lastTime = performance.now();
                inputEl.focus();
            } else {
                // 스테이지 클리어 (몬스터 사망 팝업) 후 상점 호출
                showMarket();
            }
        }

        /* =================================================================
           단일 메인 루프
        ================================================================= */
        function gameLoop(currentTime) {
            requestAnimationFrame(gameLoop);
            
            if (gameState !== 'GAME') {
                lastTime = currentTime; 
                return;
            }
            
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            stageTimer -= dt;
            updateTimerUI();
            if (stageTimer <= 0) {
                gameState = 'GAMEOVER'; inputEl.blur();
                showPopup('시간 초과!\n게임 오버!', 'GAMEOVER');
                return;
            }

            if (player.stunTimer > 0) player.stunTimer -= dt;
            if (monsterStunTimer > 0) monsterStunTimer -= dt;

            if (monsterStunTimer <= 0 && monster.hp > 0) {
                monsterAttackTimer += dt;
                let ratio = Math.min(1, monsterAttackTimer / monster.cd);
                document.getElementById('monster-gauge-img').style.clipPath = `inset(${100 - (ratio * 100)}% 0 0 0)`;

                if (monsterAttackTimer >= monster.cd) {
                    monsterAttackTimer = 0; monsterAttacksPlayer();
                }
            }

            mpRegenTimer += dt;
            if (mpRegenTimer >= 1000) {
                player.mp = Math.min(player.maxMp, player.mp + 1);
                updateStatusUI(); mpRegenTimer -= 1000;
            }

            for (const [sName, sData] of Object.entries(SKILLS)) {
                if (!sData.el) continue;
                let timePassed = currentTime - player.cooldowns[sName];
                let cdPercent = Math.min(100, (timePassed / sData.cd) * 100);
                let el = document.getElementById(sData.el);
                if (el) el.style.setProperty('--fill', `${cdPercent}%`);
            }

            if(document.activeElement !== inputEl) inputEl.focus();
        }

        inputEl.addEventListener('keydown', (e) => {
            if (gameState !== 'GAME') { e.preventDefault(); return; }

            if (e.key === 'Enter') {
                const word = e.target.value.trim();
                const now = performance.now();
                if (player.stunTimer > 0) { e.target.value = ''; return; }

                if (SKILLS[word]) {
                    let s = SKILLS[word];
                    
                    if (s.type === 'mp' && currentDiff === 1) { e.target.value = ''; return; }
                    if (s.reqFlag && !player.flags[s.reqFlag]) { e.target.value = ''; return; }
                    
                    if (now - player.cooldowns[word] >= s.cd && player.mp >= s.mp) {
                        player.cooldowns[word] = now;
                        player.mp -= s.mp;
                        
                        player.isDefending = false;
                        document.getElementById('weapon-shield').classList.remove('active');
                        
                        if (word === '방어' || word === '쉴드') {
                            player.isDefending = true;
                            player.currentDefSkill = word;
                            document.getElementById('weapon-shield').classList.add('active'); 
                            playAudio('sfx-def');
                        } else {
                            if (s.type === 'py') {
                                const sw = document.getElementById('weapon-sword');
                                sw.classList.add('active'); setTimeout(() => sw.classList.remove('active'), 150);
                            } else if (s.type === 'mp') {
                                const st = document.getElementById('weapon-staff');
                                st.classList.add('active'); setTimeout(() => st.classList.remove('active'), 150);
                            }
                            playerAttacksMonster(word, s);
                        }
                        updateStatusUI();
                    }
                }
                e.target.value = '';
            }
        });

        function playerAttacksMonster(skillName, skillData) {
            let dmg = skillData.dmg;
            if (skillData.type === 'py') dmg += player.bonusPyAtk; // 물리 공격력 보너스 적용
            
            triggerMonsterShake();
            playSpriteVFX('attack-vfx');
            playSpriteVFX('hit-vfx'); // 타격 시 히트 이펙트
            playAudio('sfx-atk');
            
            const hitLines = ["크악!", "아프다!", "이놈이!", "제법이군.."];
            playDialogue(hitLines[Math.floor(Math.random() * hitLines.length)], null);

            monster.hp -= dmg;
            updateMonsterHpUI();

            if (monster.hp <= 0) triggerMonsterDeath();
        }

        function monsterAttacksPlayer() {
            let dmg = monster.atk;
            if (player.isDefending) {
                dmg = 0; player.isDefending = false; 
                document.getElementById('weapon-shield').classList.remove('active');
                triggerBlockShake(); 
                playAudio('sfx-def');
            }

            if (dmg > 0) {
                player.hp -= dmg;
                updateStatusUI();
                triggerScreenShake(); 
                playAudio('sfx-hit');
                
                playDialogue(null, HIT_PLAYER_LINES[Math.floor(Math.random() * HIT_PLAYER_LINES.length)]);
                
                if (monster.id === 'highorc' && !player.flags.hasCombo) {
                    player.flags.hasCombo = true;
                    updateSkillUI();
                    gameState = 'POPUP';
                    inputEl.blur();
                    showPopup('연속 베기를\n습득했다!', 'NEXT');
                    return; 
                }

                if (player.hp <= 0) {
                    gameState = 'GAMEOVER'; inputEl.blur(); 
                    showPopup('게임 오버!', 'GAMEOVER');
                }
            }
        }

        function triggerMonsterDeath() {
            const mImg = document.getElementById('monster-img');
            const mGauge = document.getElementById('monster-gauge-img');
            
            mImg.classList.add('monster-dead');
            mGauge.classList.add('monster-dead');
            
            // 몬스터 체력 UI 숨김
            document.getElementById('monster-shadow').style.display = 'none';
            document.getElementById('monster-hp-bg').style.display = 'none';
            document.getElementById('monster-hp-gauge').style.display = 'none';
            document.getElementById('monster-name-tag').style.display = 'none';
            document.getElementById('monster-chat').style.display = 'none';

            setTimeout(() => {
                monsterDeathProcess();
            }, 500);
        }

        function monsterDeathProcess() {
            player.gold += 1; document.getElementById('gold-val').innerText = player.gold;
            
            let popText = `골드 +1 획득!`;
            if (monster.dropItem) {
                popText += `\n${monster.dropItem} 획득!`;
                if (monster.dropItem === '마법 지팡이') player.flags.hasStaff = true;
                if (monster.dropItem === '파이어볼 해금') player.flags.fireballActive = true;
                if (monster.dropItem === '쉴드 해금') player.flags.shieldActive = true;
            }

            const dialog = STAGE_DIALOGUE[monster.id];
            if (dialog && dialog.outro) {
                gameState = 'TRANSITION'; 
                inputEl.blur();
                playDialogue(null, dialog.outro.p);
                setTimeout(() => {
                    if (gameState === 'TRANSITION') {
                        gameState = 'POPUP';
                        showPopup(popText, 'NEXT');
                    }
                }, 3000);
            } else {
                gameState = 'POPUP'; inputEl.blur();
                showPopup(popText, 'NEXT');
            }
        }

        /* =================================================================
           UI 렌더링 업데이트
        ================================================================= */
        function updateStatusUI() {
            let hpRatio = Math.max(0, player.hp / player.maxHp);
            document.getElementById('hp-gauge').style.clipPath = `inset(0 ${100 - hpRatio * 100}% 0 0)`;
            document.getElementById('hp-text').innerText = `${player.hp}/${player.maxHp}`;
            
            let mpRatio = Math.max(0, player.mp / player.maxMp);
            document.getElementById('mp-gauge').style.clipPath = `inset(0 ${100 - mpRatio * 100}% 0 0)`;
            document.getElementById('mp-text').innerText = `${player.mp}/${player.maxMp}`;
        }

        function updateMonsterHpUI() {
            let ratio = Math.max(0, monster.hp / monster.maxHp);
            document.getElementById('monster-hp-gauge').style.clipPath = `inset(0 ${100 - ratio * 100}% 0 0)`;
        }

        function updateSkillUI() {
            if (player.flags.hasCombo) {
                document.getElementById('py-1').style.left = '190px';
                document.getElementById('py-1-extra').style.display = 'block';
            } else {
                document.getElementById('py-1').style.left = '250px';
                document.getElementById('py-1-extra').style.display = 'none';
            }
            
            if (currentDiff === 1) {
                ['mp-1', 'mp-2', 'mp-3'].forEach(id => {
                    let el = document.getElementById(id);
                    el.innerText = '???'; el.classList.add('locked-skill');
                });
                document.getElementById('weapon-staff').style.display = 'none';
            } else {
                if (player.flags.hasStaff) {
                    document.getElementById('weapon-staff').style.display = 'block';
                    document.getElementById('mp-1').innerText = '매직 애로우';
                    document.getElementById('mp-1').classList.remove('locked-skill');
                } else {
                    document.getElementById('weapon-staff').style.display = 'none';
                    document.getElementById('mp-1').innerText = '???';
                    document.getElementById('mp-1').classList.add('locked-skill');
                }

                if (player.flags.fireballActive) {
                    document.getElementById('mp-2').innerText = '파이어볼';
                    document.getElementById('mp-2').classList.remove('locked-skill');
                } else {
                    document.getElementById('mp-2').innerText = '???';
                    document.getElementById('mp-2').classList.add('locked-skill');
                }

                if (player.flags.shieldActive) {
                    document.getElementById('mp-3').innerText = '쉴드';
                    document.getElementById('mp-3').classList.remove('locked-skill');
                } else {
                    document.getElementById('mp-3').innerText = '???';
                    document.getElementById('mp-3').classList.add('locked-skill');
                }
            }
        }
    </script>
</body>
</html>
