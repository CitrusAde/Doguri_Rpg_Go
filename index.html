<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doguri's Adventure</title>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('Data/DungGeunMo.ttf') format('truetype');
        }

        body {
            margin: 0; padding: 0; background-color: #111;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'DungGeunMo', sans-serif;
            overflow: hidden; color: #fff;
        }

        #game-container {
            position: relative; width: 1280px; height: 720px;
            background-size: cover; background-position: center;
            background-color: #222; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .screen.active { display: block; }
        
        .ui-element { position: absolute; object-fit: none; }
        
        .clickable { cursor: pointer; transition: transform 0.1s ease; }
        .clickable:active { transform: scale(0.95) !important; filter: brightness(0.8); }
        .disabled { filter: grayscale(100%) brightness(0.5); pointer-events: none; }

        /* 상태 바 */
        #hp-gauge, #mp-gauge { transform-origin: left center; transition: transform 0.2s ease-out; }
        #monster-gauge-img {
            z-index: 5; filter: sepia(1) hue-rotate(320deg) saturate(5) brightness(0.6);
            clip-path: inset(100% 0 0 0); pointer-events: none;
        }

        /* 내 텍스트 입력 말풍선 */
        #my-chat-input {
            position: absolute; left: 440px; top: 443px; z-index: 20;
            width: 400px; height: 60px; /* DR_Mychat.png 이미지 크기에 맞춰 조절 필요 */
            display: flex; justify-content: center; align-items: center;
        }
        #typing-input {
            background: transparent; border: none; color: #fff;
            font-size: 30px; font-family: 'DungGeunMo', sans-serif;
            text-align: center; outline: none; width: 100%;
        }

        /* 몬스터 말풍선 */
        #monster-chat {
            position: absolute; left: 700px; top: 100px; background: #fff; color: #000;
            padding: 15px 25px; border-radius: 20px; font-size: 24px; max-width: 300px;
            z-index: 10; display: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #monster-chat::before {
            content: ''; position: absolute; bottom: -15px; left: 30px;
            border-width: 15px 15px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        /* 팝업 UI */
        #popup-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; display: none;
        }
        .popup-text {
            position: absolute; left: 461px; top: 220px; width: 358px; height: 200px; /* 팝업 크기 임의지정 */
            display: flex; justify-content: center; align-items: center; text-align: center;
            font-size: 30px; color: #fff; z-index: 102;
        }

        /* 스킬 텍스트 */
        .skill-text {
            position: absolute; transform: translate(-50%, -50%); font-size: 26px; font-weight: bold; z-index: 10;
            background: linear-gradient(to top, #fff var(--fill, 100%), #444 var(--fill, 100%));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .locked-skill { color: #555 !important; background: none !important; -webkit-text-fill-color: #555 !important; }

        /* 물리 스킬 */
        #py-1 { left: 249px; top: 580px; }
        #py-1-extra { left: 350px; top: 580px; display: none; } /* 연속 베기 */
        #py-2 { left: 249px; top: 610px; }
        #py-3 { left: 249px; top: 640px; }
        /* 마법 스킬 */
        #mp-1 { left: 1030px; top: 580px; }
        #mp-2 { left: 1030px; top: 610px; }
        #mp-3 { left: 1030px; top: 640px; }

    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- 상단 버튼 -->
        <img id="stop-btn" src="Data/DR_Stop_Button.png" class="ui-element clickable" style="left: 50px; top: 50px; display: none; z-index: 100;" onclick="togglePause()" alt="Pause">
        <img id="back-btn" src="Data/DR_Back_Button.png" class="ui-element clickable" style="left: 1030px; top: 54.5px; display: none; z-index: 100;" onclick="goBack()" alt="Back">

        <!-- 1. 시작 화면 -->
        <div id="start-screen" class="screen active">
            <img src="Data/DR_Logo.png" class="ui-element" style="left: 332px; top: 58px;" alt="Logo">
            <img src="Data/DR_Start_Button.png" class="ui-element clickable" style="left: 530.5px; top: 567px;" onclick="switchScreen('diff-screen')" alt="Start">
        </div>

        <!-- 2. 난이도 선택 화면 -->
        <div id="diff-screen" class="screen">
            <img src="Data/DR_Easy_Button.png" id="diff-1" class="ui-element clickable" style="left: 132px; top: 149px;" onclick="selectDiff(1)" alt="Easy">
            <img src="Data/DR_Normal_Button.png" id="diff-2" class="ui-element clickable" style="left: 394px; top: 149px;" onclick="selectDiff(2)" alt="Normal">
            <img src="Data/DR_Hard_Button.png" id="diff-3" class="ui-element clickable" style="left: 656px; top: 149px;" onclick="selectDiff(3)" alt="Hard">
            <img src="Data/DR_Extreme_Button.png" id="diff-4" class="ui-element disabled" style="left: 918px; top: 149px;" alt="Extreme">
            
            <img src="Data/DR_Play_Button.png" class="ui-element clickable" style="left: 530.5px; top: 567px;" onclick="startGame()" alt="Play">
        </div>

        <!-- 3. 게임 플레이 화면 -->
        <div id="game-screen" class="screen">
            
            <div style="position:absolute; left:40px; top:120px; font-size:30px; color:#ffd700; z-index:10;">Gold: <span id="gold-val">0</span></div>

            <!-- 몬스터 영역 -->
            <img id="monster-img" src="" class="ui-element" style="left: 479px; top: 193px; z-index: 4;">
            <img id="monster-gauge-img" src="" class="ui-element" style="left: 479px; top: 193px;">
            <div id="monster-chat"></div>

            <!-- 상태 UI -->
            <img src="Data/DR_HP_Bg.png" class="ui-element" style="left: 170px; top: 459px; z-index: 1;">
            <img src="Data/DR_MP_Bg.png" class="ui-element" style="left: 880px; top: 439px; z-index: 1;">
            <img id="hp-gauge" src="Data/DR_HP_Gauge.png" class="ui-element" style="left: 269.5px; top: 470px; z-index: 2;">
            <img id="mp-gauge" src="Data/DR_MP_Gauge.png" class="ui-element" style="left: 947px; top: 459px; z-index: 2;">

            <!-- 스킬 UI 배경 -->
            <img src="Data/DR_Py_Attack_Bg.png" class="ui-element" style="left: 120px; top: 494px; z-index: 1;">
            <img src="Data/DR_Mp_Attack_Bg.png" class="ui-element" style="left: 900px; top: 493px; z-index: 1;">
            
            <!-- 내 입력창 (Mychat 배경) -->
            <img src="Data/DR_Mychat.png" class="ui-element" style="left: 440px; top: 443px; z-index: 1;">
            <div id="my-chat-input">
                <input type="text" id="typing-input" autocomplete="off" spellcheck="false" placeholder="스킬 입력">
            </div>

            <img src="Data/DR_Attack_Time.png" class="ui-element" style="left: 473px; top: 668px; z-index: 1;">

            <!-- 스킬 텍스트 -->
            <div id="py-1" class="skill-text">베기</div>
            <div id="py-1-extra" class="skill-text">연속 베기</div>
            <div id="py-2" class="skill-text">찌르기</div>
            <div id="py-3" class="skill-text">방어</div>

            <div id="mp-1" class="skill-text">매직 애로우</div>
            <div id="mp-2" class="skill-text locked-skill">???</div>
            <div id="mp-3" class="skill-text">쉴드</div>
            <!-- 라이트닝은 추후 위치 지정 시 추가 -->
        </div>

        <!-- 4. 팝업 레이어 -->
        <div id="popup-layer">
            <img src="Data/DR_Item_Popup.png" class="ui-element" style="left: 461px; top: 220px; z-index: 101;">
            <div id="popup-text" class="popup-text">골드 +1 획득!</div>
            <img src="Data/DR_Next_Button.png" class="ui-element clickable" style="left: 531px; top: 428px; z-index: 102;" onclick="nextStage()" alt="Next">
        </div>

    </div>

    <script>
        /* =================================================================
           데이터 및 설정
        ================================================================= */
        const BG_MAP = {
            main: 'url("Data/DR_Main_Bg.png")',
            select: 'url("Data/DR_Game_Select_Bg.png")',
            bgList: {
                1: ['url("Data/DR_Easy_stage_1_Bg.png")', 'url("Data/DR_Easy_stage_2_Bg.png")'],
                2: ['url("Data/DR_Normal_stage_1_Bg.png")', 'url("Data/DR_Normal_stage_2_Bg.png")'],
                3: ['url("Data/DR_Hard_stage_1_Bg.png")', 'url("Data/DR_Hard_stage_2_Bg.png")']
            }
        };

        const SKILLS = {
            '베기': { type: 'py', dmg: 1, cd: 1000, mp: 0, el: 'py-1' },
            '연속 베기': { type: 'py', dmg: 3, cd: 2000, mp: 0, el: 'py-1-extra', reqFlag: 'hasCombo' },
            '찌르기': { type: 'py', dmg: 1, cd: 2000, mp: 0, el: 'py-2' },
            '방어': { type: 'py', dmg: 0, cd: 2000, mp: 0, el: 'py-3' },
            '매직 애로우': { type: 'mp', dmg: 2, cd: 2000, mp: 2, el: 'mp-1' },
            '파이어볼': { type: 'mp', dmg: 3, cd: 3000, mp: 3, el: 'mp-2', reqFlag: 'fireballActive' },
            '라이트닝': { type: 'mp', dmg: 5, cd: 5000, mp: 5, el: null }, // UI 위치 할당 전
            '쉴드': { type: 'mp', dmg: 0, cd: 2000, mp: 2, el: 'mp-3' }
        };

        // 몬스터 DB 세팅
        const STAGE_DATA = {
            1: [ // Easy
                { id: 'kobold', name: '코볼트', img: 'DR_Monster_Kobold.png', hp: 5, atk: 1, cd: 5000, bgIdx: 0 },
                { id: 'goblin', name: '고블린', img: 'DR_Monster_Goblin.png', hp: 7, atk: 1, cd: 4000, bgIdx: 0 },
                { id: 'orc', name: '오크', img: 'DR_Monster_Orc.png', hp: 9, atk: 1, cd: 4000, bgIdx: 0 },
                { id: 'highorc', name: '하이오크', img: 'DR_Monster_High Orc.png', hp: 12, atk: 2, cd: 4000, isBoss: true, bgIdx: 0 },
                { id: 'slime', name: '슬라임', img: 'DR_Monster_Slime.png', hp: 5, atk: 1, cd: 5000, bgIdx: 1 },
                { id: 'swarm1', name: '거대 모기 벌레', img: 'DR_Monster_Swarm.png', hp: 5, atk: 2, cd: 4000, bgIdx: 1 },
                { id: 'ghoul', name: '구울', img: 'DR_Monster_Ghoul.png', hp: 9, atk: 1, cd: 4000, dropItem: '마법 지팡이', bgIdx: 1 },
                { id: 'troll', name: '트롤', img: 'DR_Monster_Troll.png', hp: 20, atk: 2, cd: 3000, isBoss: true, bgIdx: 1 }
            ],
            2: [ // Normal
                { id: 'swarm2', name: '박쥐 떼', img: 'DR_Monster_Swarm.png', hp: 8, atk: 3, cd: 4000, bgIdx: 0 },
                { id: 'golem', name: '바위 골렘', img: 'DR_Monster_Golem.png', hp: 15, atk: 2, cd: 4000, bgIdx: 0 },
                { id: 'spider', name: '거대 독거미', img: 'DR_Monster_Spider.png', hp: 10, atk: 1, cd: 3000, bgIdx: 0 },
                { id: 'scorpion', name: '크리스탈 스콜피온', img: 'DR_Monster_Spider.png', hp: 25, atk: 3, cd: 3000, isBoss: true, bgIdx: 0 },
                { id: 'wolf', name: '늑대', img: 'DR_Monster_Scorpion.png', hp: 10, atk: 2, cd: 4000, bgIdx: 1 },
                { id: 'harpy', name: '하피', img: 'DR_Monster_Harpy.png', hp: 15, atk: 3, cd: 3000, bgIdx: 1 },
                { id: 'mandragora', name: '만드라고라', img: 'DR_Monster_Mandragora.png', hp: 10, atk: 4, cd: 3000, bgIdx: 1 },
                { id: 'griffin', name: '그리핀', img: 'DR_Monster_Griffin.png', hp: 15, atk: 2, cd: 3000, isBoss: true, bgIdx: 1 }
            ],
            3: [ // Hard
                { id: 'skeleton', name: '해골 병사', img: 'DR_Monster_Skeleton.png', hp: 15, atk: 2, cd: 2000, bgIdx: 0 },
                { id: 'gargoyle', name: '가고일', img: 'DR_Monster_Gargoyle.png', hp: 15, atk: 5, cd: 3000, bgIdx: 0 },
                { id: 'dullahan', name: '듀라한', img: 'DR_Monster_Dullahan.png', hp: 30, atk: 3, cd: 3000, isBoss: true, bgIdx: 0 },
                { id: 'succubus', name: '서큐버스', img: 'DR_Monster_Succubus.png', hp: 20, atk: 5, cd: 3000, bgIdx: 1 },
                { id: 'demon', name: '마왕', img: 'DR_Monster_Demon.png', hp: 40, atk: 10, cd: 3000, isBoss: true, bgIdx: 1 }
            ]
        };

        let gameState = 'START'; // START, DIFF, GAME, PAUSE, POPUP
        let currentDiff = 1;
        let selectedDiff = 1;
        let monsterIdx = 0;
        
        let player = {
            maxHp: 10, hp: 10, maxMp: 10, mp: 10, gold: 0,
            cooldowns: {}, flags: {}, isDefending: false, stunTimer: 0
        };
        let monster = null;
        
        let lastTime = 0;
        let monsterAttackTimer = 0;
        let mpRegenTimer = 0;
        let monsterStunTimer = 0;
        let gameLoopId = null;

        const container = document.getElementById('game-container');
        const inputEl = document.getElementById('typing-input');
        container.style.backgroundImage = BG_MAP.main;

        /* =================================================================
           UI 컨트롤
        ================================================================= */
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.getElementById('back-btn').style.display = (screenId === 'start-screen') ? 'none' : 'block';
            document.getElementById('stop-btn').style.display = (screenId === 'game-screen') ? 'block' : 'none';

            if (screenId === 'start-screen') {
                gameState = 'START'; container.style.backgroundImage = BG_MAP.main;
            } else if (screenId === 'diff-screen') {
                gameState = 'DIFF'; container.style.backgroundImage = BG_MAP.select;
                selectDiff(selectedDiff); // 초기화
            }
        }

        function selectDiff(diff) {
            if (diff === 4) return; // Extreme 막음
            selectedDiff = diff;
            for(let i=1; i<=3; i++) {
                document.getElementById(`diff-${i}`).style.filter = (i === diff) ? 'brightness(1.2) drop-shadow(0 0 10px #ff0)' : 'none';
            }
        }

        function goBack() {
            if (gameState === 'DIFF') switchScreen('start-screen');
            else if (gameState === 'GAME' || gameState === 'PAUSE') { stopGameLoop(); switchScreen('diff-screen'); }
        }

        function togglePause() {
            if (gameState === 'GAME') {
                gameState = 'PAUSE';
                document.getElementById('popup-layer').style.display = 'block';
                document.getElementById('popup-text').innerText = '일시 정지';
                document.querySelector('#popup-layer img[onclick="nextStage()"]').style.display = 'none'; // 다음 버튼 숨김
            } else if (gameState === 'PAUSE') {
                gameState = 'GAME';
                document.getElementById('popup-layer').style.display = 'none';
                document.querySelector('#popup-layer img[onclick="nextStage()"]').style.display = 'block';
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }
        }

        /* =================================================================
           게임 흐름
        ================================================================= */
        function startGame() {
            currentDiff = selectedDiff;
            monsterIdx = 0;
            
            // 플레이어 난이도 클리어 스탯 적용 (임시로 클리어 횟수를 방어적으로 1번만 적용한다 가정)
            // 실제 로직에선 localStorage 등으로 클리어 데이터를 불러옴
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            player.flags = { ...player.flags, blockCount: 0, dullahanBlock: 0, griffinHits: 0 };
            
            Object.keys(SKILLS).forEach(k => player.cooldowns[k] = 0);
            updateStatusUI();
            
            switchScreen('game-screen');
            loadMonster();
            
            gameState = 'GAME';
            lastTime = performance.now();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function loadMonster() {
            let mData = STAGE_DATA[currentDiff][monsterIdx];
            if (!mData) { alert('스테이지 클리어!'); goBack(); return; }
            
            monster = { ...mData }; // 복사
            monsterAttackTimer = 0;
            monsterStunTimer = 0;
            
            document.getElementById('monster-img').src = `Data/${monster.img}`;
            document.getElementById('monster-gauge-img').src = `Data/${monster.img}`;
            container.style.backgroundImage = BG_MAP.bgList[currentDiff][monster.bgIdx];
            
            updateSkillUI();
        }

        function nextStage() {
            document.getElementById('popup-layer').style.display = 'none';
            monsterIdx++;
            loadMonster();
            gameState = 'GAME';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
            inputEl.focus();
        }

        /* =================================================================
           게임 루프 & 전투 로직
        ================================================================= */
        function gameLoop(currentTime) {
            if (gameState !== 'GAME') return;
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            // 스턴 타이머 처리
            if (player.stunTimer > 0) player.stunTimer -= dt;
            if (monsterStunTimer > 0) monsterStunTimer -= dt;

            // 몬스터 공격 진행
            if (monsterStunTimer <= 0) {
                monsterAttackTimer += dt;
                let ratio = Math.min(1, monsterAttackTimer / monster.cd);
                document.getElementById('monster-gauge-img').style.clipPath = `inset(${100 - (ratio * 100)}% 0 0 0)`;

                if (monsterAttackTimer >= monster.cd) {
                    monsterAttackTimer = 0;
                    monsterAttacksPlayer();
                }
            }

            // MP 리젠 (1초당 1)
            mpRegenTimer += dt;
            if (mpRegenTimer >= 1000) {
                player.mp = Math.min(player.maxMp, player.mp + 1);
                updateStatusUI();
                mpRegenTimer -= 1000;
            }

            // 쿨타임 UI 업데이트
            for (const [sName, sData] of Object.entries(SKILLS)) {
                if (!sData.el) continue;
                let timePassed = currentTime - player.cooldowns[sName];
                let cdPercent = Math.min(100, (timePassed / sData.cd) * 100);
                let el = document.getElementById(sData.el);
                if (el) el.style.setProperty('--fill', `${cdPercent}%`);
            }

            if(document.activeElement !== inputEl) inputEl.focus();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        inputEl.addEventListener('keydown', (e) => {
            if (gameState === 'GAME' && e.key === 'Enter') {
                const word = e.target.value.trim();
                const now = performance.now();
                if (player.stunTimer > 0) { e.target.value = ''; return; } // 스턴 시 입력 불가

                if (SKILLS[word]) {
                    let s = SKILLS[word];
                    // 스킬 잠금 해제 확인
                    if (s.reqFlag && !player.flags[s.reqFlag]) return;
                    
                    if (now - player.cooldowns[word] >= s.cd && player.mp >= s.mp) {
                        player.cooldowns[word] = now;
                        player.mp -= s.mp;
                        player.isDefending = false; // 공격 시 방어 풀림
                        
                        if (word === '방어' || word === '쉴드') {
                            player.isDefending = true;
                            player.currentDefSkill = word;
                        } else {
                            playerAttacksMonster(word, s);
                        }
                        updateStatusUI();
                    }
                }
                e.target.value = '';
            }
        });

        function playerAttacksMonster(skillName, skillData) {
            let dmg = skillData.dmg;

            // --- 몬스터 기믹 처리 (방어/회피) ---
            if (monster.id === 'golem' && skillData.type === 'py' && Math.random() < 0.5) dmg = 1;
            if (monster.id === 'golem' && skillData.type === 'mp' && Math.random() < 0.5) dmg *= 2;
            if (monster.id === 'harpy' && skillData.type === 'mp') dmg *= 2;
            if (monster.id === 'griffin' && Math.random() < 0.5) dmg = 0; // 50% 회피
            if (monster.id === 'dullahan') {
                if (skillName === '연속 베기') dmg = skillData.dmg;
                else if (skillData.type === 'mp') dmg = 1;
                else dmg = 0;
            }
            if (monster.id === 'succubus') {
                if (skillData.type === 'py' && Math.random() < 0.5) dmg = 0;
                if (skillData.type === 'mp') dmg = 2;
            }
            if (monster.id === 'demon') {
                if (skillData.type === 'py' && Math.random() < 0.8) dmg = 0;
                if (skillData.type === 'mp') dmg = 1;
            }
            if (monster.id === 'troll' && player.flags.trollDebuff && skillData.type === 'py') dmg *= 2;

            // 특수 스킬 효과
            if (monster.id === 'swarm2' && skillName === '파이어볼') dmg = monster.hp;
            if (monster.id === 'troll' && skillName === '파이어볼') player.flags.trollDebuff = true;
            if (monster.id === 'highorc' && skillName === '연속 베기') monsterStunTimer = 3000;
            if (monster.id === 'scorpion' && skillName === '연속 베기') {
                player.flags.scorpHits = (player.flags.scorpHits || 0) + 1;
                if (player.flags.scorpHits >= 2) { monsterStunTimer = 3000; player.flags.scorpHits = 0; }
            }
            if (monster.id === 'succubus' && skillName === '라이트닝' && Math.random() < 0.5) monsterStunTimer = 3000;
            if (monster.id === 'demon' && skillName === '매직 애로우' && Math.random() < 0.5) monsterStunTimer = 2000;

            // 그리핀 특수 처치
            if (monster.id === 'griffin' && skillName === '매직 애로우' && dmg > 0) {
                player.flags.griffinHits++;
                if (player.flags.griffinHits >= 3) dmg = monster.hp; else dmg = 0;
            }

            monster.hp -= dmg;
            if (monster.hp <= 0) monsterDeath();
        }

        function monsterAttacksPlayer() {
            let dmg = monster.atk;
            let isBlocked = player.isDefending;

            // 방어 기믹
            if (isBlocked) {
                if (monster.id === 'gargoyle') dmg = 1; // 가고일 관통
                else if (monster.id === 'succubus') dmg = 2; // 서큐버스 관통
                else if (monster.id === 'demon' && player.currentDefSkill !== '쉴드') dmg = monster.atk; // 마왕은 쉴드만 가능
                else {
                    dmg = 0; // 완벽 방어
                    if (monster.id === 'wolf') {
                        player.flags.blockCount++;
                        if (player.flags.blockCount >= 2) monsterDeath('도망침');
                    }
                    if (monster.id === 'dullahan') {
                        player.flags.dullahanBlock++;
                        const dLines = ["오호? 내 공격을 막다니!", "어디 이 공격도 막아보시지!", "쥐새끼 같은놈!", "언제까지 막기만 할것이냐!", "내가 졌다.."];
                        showMonsterChat(dLines[player.flags.dullahanBlock - 1]);
                        if (player.flags.dullahanBlock >= 5) setTimeout(() => monsterDeath('스스로 무너짐'), 1500);
                    }
                }
                player.isDefending = false; // 1회 방어 후 풀림
            }

            if (dmg > 0) {
                player.hp -= dmg;
                // 플레이어 피격 시 기믹 트리거
                if (monster.id === 'spider' && !isBlocked) player.hp -= 1; // 독뎀
                if (monster.id === 'mandragora') player.stunTimer = 1000;
                
                if (monster.id === 'highorc' && !player.flags.hasCombo) {
                    player.flags.hasCombo = true;
                    showMonsterChat("크하하! 겨우 그정도냐!");
                    updateSkillUI();
                }
                if (monster.id === 'troll' && player.flags.hasStaff && !player.flags.fireballActive) {
                    player.flags.fireballActive = true;
                    updateSkillUI();
                }

                updateStatusUI();
                if (player.hp <= 0) {
                    alert("게임 오버!");
                    goBack();
                }
            }
        }

        function monsterDeath(reason = '') {
            player.gold += 1;
            document.getElementById('gold-val').innerText = player.gold;
            
            // 아이템 드롭 체크
            let popText = `골드 +1 획득!`;
            if (monster.dropItem) {
                popText += `\n${monster.dropItem} 획득!`;
                if (monster.dropItem === '마법 지팡이') {
                    player.flags.hasStaff = true;
                    updateSkillUI();
                }
            }
            if (reason) popText = `${reason}\n${popText}`;

            gameState = 'POPUP';
            document.getElementById('popup-layer').style.display = 'block';
            document.getElementById('popup-text').innerText = popText;
        }

        function updateStatusUI() {
            document.getElementById('hp-gauge').style.transform = `scaleX(${Math.max(0, player.hp / player.maxHp)})`;
            document.getElementById('mp-gauge').style.transform = `scaleX(${Math.max(0, player.mp / player.maxMp)})`;
        }

        function updateSkillUI() {
            if (player.flags.hasCombo) document.getElementById('py-1-extra').style.display = 'block';
            
            let fbEl = document.getElementById('mp-2');
            if (player.flags.fireballActive) {
                fbEl.innerText = '파이어볼';
                fbEl.classList.remove('locked-skill');
            } else if (player.flags.hasStaff) {
                fbEl.innerText = '파이어볼'; // 지팡이 얻었으나 비활성화 상태
            }
        }

        function showMonsterChat(text) {
            const chatBox = document.getElementById('monster-chat');
            chatBox.style.display = 'block';
            chatBox.innerText = text;
            setTimeout(() => chatBox.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
